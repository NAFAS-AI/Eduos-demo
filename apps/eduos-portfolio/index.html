<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>المحفظة الرقمية — EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<script src="/apps/platform-autologout.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    margin: 0;
    padding: 0;font-family:'Tajawal',Arial,sans-serif;background:#F0F4F8;color:#1e293b;min-height:100vh;direction:rtl}
:root{--primary:#6C3DD6;--secondary:#22D3EE;--card:#fff;--border:#e2e8f0;--text:#1e293b;--text2:#64748b}
.hdr{background:linear-gradient(135deg,#6C3DD6,#22D3EE);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(108,61,214,.25)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{background:rgba(255,255,255,.2);border-radius:10px;padding:8px 14px;font-size:1.4rem;font-weight:900;color:#fff}
.hdr-title{color:#fff;font-size:1rem;font-weight:700}
.hdr-sub{color:rgba(255,255,255,.8);font-size:.75rem}
.btn-hdr{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 14px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;transition:.2s}
.btn-hdr:hover{background:rgba(255,255,255,.35)}
.tabs-bar{background:#fff;border-bottom:2px solid var(--border);padding:0 24px;display:flex;gap:2px;overflow-x:auto}
.tab{padding:14px 18px;border:none;background:transparent;color:var(--text2);font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.panel{display:none}.panel.active{display:block}
.main{padding:24px;max-width:1100px;margin:0 auto}
.card{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.card-title{font-size:1rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.portfolio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.portfolio-item{background:var(--card);border-radius:14px;border:2px solid var(--border);overflow:hidden;transition:.2s}
.portfolio-item:hover{border-color:var(--primary);box-shadow:0 4px 14px rgba(108,61,214,.15);transform:translateY(-2px)}
.p-thumb{height:120px;background:linear-gradient(135deg,#ede9fe,#dbeafe);display:flex;align-items:center;justify-content:center;font-size:3rem}
.p-body{padding:14px}
.p-title{font-weight:700;font-size:.92rem;margin-bottom:4px}
.p-meta{font-size:.75rem;color:var(--text2);display:flex;justify-content:space-between}
.p-tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.badge{padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700;display:inline-block}
.badge-blue{background:#dbeafe;color:#1d4ed8}.badge-green{background:#dcfce7;color:#16a34a}.badge-yellow{background:#fef3c7;color:#d97706}.badge-purple{background:#ede9fe;color:#7c3aed}
input,select,textarea{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:8px;color:var(--text);padding:9px 14px;font-family:inherit;font-size:.88rem}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:6px}
.btn{padding:9px 20px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:700;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff}.btn-primary:hover{opacity:.9}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--primary)}
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:30px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:14px}
.upload-zone:hover{border-color:var(--primary);background:#F8FAFF}
.upload-icon{font-size:2.5rem;margin-bottom:8px}
.upload-text{font-weight:700;color:var(--text2);font-size:.88rem}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:10px;padding:12px 24px;font-size:.88rem;font-weight:600;z-index:999;display:none}
.toast.show{display:block}
</style>
<script src="../platform-lang.js" defer></script>
<script src="../platform-config.js"></script>
</head>
<body>
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">📁</div>
    <div>
      <div class="hdr-title">المحفظة الرقمية | e-Portfolio</div>
      <div class="hdr-sub">أعمال الطلاب/ات وإنجازاتهم/ن — EduOS</div>
    </div>
  </div>
  <button class="btn-hdr" onclick="location.href='/apps/eduos-hub/'">← الرئيسية</button>
</header>
<div class="tabs-bar">
  <button class="tab active" onclick="switchTab('gallery')">🖼️ معرض الأعمال</button>
  <button class="tab" onclick="switchTab('upload')">📤 رفع عمل</button>
  <button class="tab" onclick="switchTab('feedback')">💬 التغذية الراجعة</button>
</div>
<div class="main">
  <div id="tab-gallery" class="panel active">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <input type="text" style="max-width:300px" placeholder="🔍 بحث في الأعمال..."/>
      <select style="max-width:180px"><option>الكل</option><option>رياضيات</option><option>عربي</option><option>علوم</option><option>فن</option></select>
    </div>
    <div class="portfolio-grid" id="portfolioGrid"></div>
  </div>

  <div id="tab-upload" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">📤 رفع عمل جديد | Upload Work</div></div>
      <div style="max-width:600px">
        <div class="upload-zone" onclick="showToast('📤 رفع ملف — سيُفعَّل مع Drive Integration')">
          <div class="upload-icon">📎</div>
          <div class="upload-text">اسحب الملف هنا أو انقر للاختيار</div>
          <div style="font-size:.75rem;color:var(--text2);margin-top:4px">PDF, صور, مقاطع فيديو — حد أقصى 25 MB</div>
        </div>
        <div class="form-group"><label class="form-label">عنوان العمل | Title</label><input type="text" placeholder="اسم العمل..."/></div>
        <div class="form-group"><label class="form-label">المادة | Subject</label><select><option>اللغة العربية</option><option>الرياضيات</option><option>العلوم</option><option>الإنجليزية</option><option>التربية الإسلامية</option><option>الفنون</option></select></div>
        <div class="form-group"><label class="form-label">الوصف | Description</label><textarea style="min-height:80px" placeholder="وصف مختصر للعمل..."></textarea></div>
        <button class="btn btn-primary" onclick="showToast('✅ تم رفع العمل للمحفظة!')">📁 إضافة للمحفظة</button>
      </div>
    </div>
  </div>

  <div id="tab-feedback" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">💬 التغذية الراجعة | Feedback</div></div>
      <div id="feedbackList">
        <div style="text-align:center;padding:40px;color:var(--text2)">
          <div style="font-size:3rem;margin-bottom:10px">💬</div>
          <div style="font-weight:700">لا توجد تغذية راجعة بعد</div>
          <div style="font-size:.82rem;margin-top:4px">ارفع أعمالك/ن وسيضيف/تضيف المعلم/ة تغذية راجعة</div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SB='https://zuyizaiugpmhmeycqton.supabase.co';
const KEY=window.EduOS?.SB_KEY;
const DEMO=[{emoji:'🎨',title:'لوحة الوطن',subject:'الفنون',date:'2026-06-20',tags:['إبداع','فن'],badge:'badge-purple'},{emoji:'📝',title:'قصة قصيرة: الأمل',subject:'العربية',date:'2026-06-18',tags:['كتابة','إبداع'],badge:'badge-blue'},{emoji:'🔢',title:'حل مسائل جبر متقدم',subject:'الرياضيات',date:'2026-06-15',tags:['جبر','تميز'],badge:'badge-green'},{emoji:'🔬',title:'تقرير تجربة المختبر',subject:'العلوم',date:'2026-06-10',tags:['علوم','بحث'],badge:'badge-yellow'}];

async function init(){
  try{
    const r=await fetch(`${SB}/rest/v1/portfolio_items?select=*&order=created_at.desc&limit=20`,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    const items=r.ok?await r.json():null;
    if(items&&items.length>0){
      renderPortfolio(items.map(i=>({emoji:'📁',title:i.title||'عمل',subject:i.subject||'—',date:(i.created_at||'').slice(0,10),tags:[],badge:'badge-blue'})));
      return;
    }
  }catch(e){}
  renderPortfolio(DEMO);
}

function renderPortfolio(items){
  document.getElementById('portfolioGrid').innerHTML=items.map(i=>`
    <div class="portfolio-item">
      <div class="p-thumb">${i.emoji}</div>
      <div class="p-body">
        <div class="p-title">${i.title}</div>
        <div class="p-meta"><span>${i.subject}</span><span>${i.date}</span></div>
        <div class="p-tags">${i.tags.map(t=>`<span class="badge ${i.badge}">${t}</span>`).join('')}</div>
      </div>
    </div>`).join('');
}

function switchTab(n){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); ['gallery','upload','feedback'].forEach((t,i)=>{ if(t===n) document.querySelectorAll('.tab')[i].classList.add('active'); }); document.getElementById(`tab-${n}`).classList.add('active'); }
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
init();
</script>
</body>
</html>
