<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>الصيانة والمرافق — EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<script src="../platform-lang.js" defer></script>
<script src="/apps/platform-config.js"></script>
<script src="/apps/platform-autologout.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    margin: 0;
    padding: 0;font-family:'Tajawal',Arial,sans-serif;background:#F0F4F8;color:#1e293b;min-height:100vh;direction:rtl}
:root{--primary:#6C3DD6;--secondary:#22D3EE;--card:#fff;--border:#e2e8f0;--text:#1e293b;--text2:#64748b}
.hdr{background:linear-gradient(135deg,#6C3DD6,#22D3EE);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(108,61,214,.25)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{background:rgba(255,255,255,.2);border-radius:10px;padding:8px 14px;font-size:1.4rem;font-weight:900;color:#fff}
.hdr-title{color:#fff;font-size:1rem;font-weight:700}
.hdr-sub{color:rgba(255,255,255,.8);font-size:.75rem}
.btn-hdr{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 14px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;transition:.2s}
.tabs-bar{background:#fff;border-bottom:2px solid var(--border);padding:0 24px;display:flex;gap:2px;overflow-x:auto;position:sticky;top:60px;z-index:90}
.tab{padding:14px 18px;border:none;background:transparent;color:var(--text2);font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.panel{display:none}.panel.active{display:block}
.main{padding:24px;max-width:1100px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
@media(max-width:768px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--card);border-radius:14px;padding:18px;border:1px solid var(--border);text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.kpi-icon{font-size:1.8rem;margin-bottom:6px}.kpi-num{font-size:1.6rem;font-weight:900}.kpi-label{font-size:.75rem;color:var(--text2)}
.card{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.card-title{font-size:1rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.ticket-item{display:flex;align-items:flex-start;gap:12px;padding:14px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;transition:.2s}
.ticket-item:hover{background:#F8FAFF}
.ticket-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.badge{padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700;display:inline-block}
.badge-green{background:#dcfce7;color:#16a34a}.badge-yellow{background:#fef3c7;color:#d97706}
.badge-red{background:#fee2e2;color:#dc2626}.badge-blue{background:#dbeafe;color:#1d4ed8}.badge-gray{background:#f1f5f9;color:#64748b}
input,select,textarea{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:8px;color:var(--text);padding:9px 14px;font-family:inherit;font-size:.88rem}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:6px}
.btn{padding:9px 20px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:700;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff}.btn-primary:hover{opacity:.9}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead{background:#F8FAFF}
th{padding:11px 14px;text-align:right;font-weight:700;color:var(--text2);border-bottom:2px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F8FAFF}
.loading{text-align:center;padding:32px;color:var(--text2);font-size:.88rem}
.error-msg{text-align:center;padding:24px;color:#ef4444;font-size:.88rem}
.empty-msg{text-align:center;padding:32px;color:var(--text2);font-size:.88rem}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:10px;padding:12px 24px;font-size:.88rem;font-weight:600;z-index:999;display:none}
.toast.show{display:block}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">🔧</div>
    <div>
      <div class="hdr-title">الصيانة والمرافق | Maintenance</div>
      <div class="hdr-sub">تذاكر الصيانة ومتابعة المرافق — EduOS</div>
    </div>
  </div>
  <button class="btn-hdr" onclick="history.back()">← رجوع</button>
</header>
<div class="tabs-bar">
  <button class="tab active" onclick="switchTab('tickets')">🎫 التذاكر</button>
  <button class="tab" onclick="switchTab('new')">➕ تذكرة جديدة</button>
  <button class="tab" onclick="switchTab('facilities')">🏫 المرافق</button>
  <button class="tab" onclick="switchTab('schedule')">📅 الجدول</button>
</div>
<div class="main">
  <div class="kpis">
    <div class="kpi-card"><div class="kpi-icon">🔧</div><div class="kpi-num" id="kpiOpen" style="color:#d97706">—</div><div class="kpi-label">تذاكر مفتوحة</div></div>
    <div class="kpi-card"><div class="kpi-icon">✅</div><div class="kpi-num" id="kpiClosed" style="color:#16a34a">—</div><div class="kpi-label">مُغلَقة هذا الشهر</div></div>
    <div class="kpi-card"><div class="kpi-icon">⚡</div><div class="kpi-num" id="kpiUrgent" style="color:#ef4444">—</div><div class="kpi-label">عاجلة</div></div>
    <div class="kpi-card"><div class="kpi-icon">📊</div><div class="kpi-num" id="kpiTotal">—</div><div class="kpi-label">الإجمالي</div></div>
  </div>

  <div id="tab-tickets" class="panel active">
    <div class="card">
      <div class="card-header">
        <div class="card-title">🎫 تذاكر الصيانة | Tickets</div>
        <button class="btn btn-primary" onclick="switchTab('new')">➕ تذكرة جديدة</button>
      </div>
      <div id="ticketsList"><div class="loading">جاري التحميل...</div></div>
    </div>
  </div>

  <div id="tab-new" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">➕ تذكرة صيانة جديدة</div></div>
      <div style="max-width:550px">
        <div class="form-group"><label class="form-label">نوع المشكلة | Type</label>
          <select id="mType">
            <option>كهرباء / إضاءة</option><option>سباكة / مياه</option>
            <option>تكييف / تبريد</option><option>أمن / قفل</option>
            <option>نظافة</option><option>أثاث</option><option>بنية تحتية</option><option>أخرى</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">الموقع | Location *</label><input type="text" id="mLocation" placeholder="الفصل / المبنى / الموقع..."/></div>
        <div class="form-group"><label class="form-label">الأولوية | Priority</label>
          <select id="mPriority">
            <option value="normal">عادي — يُصلَح خلال أسبوع</option>
            <option value="urgent">عاجل — يُصلَح خلال 24 ساعة</option>
            <option value="emergency">طارئ — يُصلَح فوراً</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">وصف المشكلة | Description</label><textarea id="mDesc" style="min-height:80px" placeholder="وصف تفصيلي..."></textarea></div>
        <button class="btn btn-primary" onclick="submitTicket()">📤 رفع التذكرة</button>
      </div>
    </div>
  </div>

  <div id="tab-facilities" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">🏫 حالة المرافق | Facilities Status</div></div>
      <div id="facilitiesContent"><div class="loading">جاري التحميل...</div></div>
    </div>
  </div>

  <div id="tab-schedule" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">📅 جدول الصيانة الدورية | Preventive Schedule</div></div>
      <div id="scheduleContent"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SB_URL = (window.EduOS?.SB_URL) || '';
const SB_KEY = (window.EduOS?.SB_KEY) || '';
const H = () => ({'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json'});
const q = (t, p='') => fetch(`${SB_URL}/rest/v1/${t}${p}`, {headers: H()}).then(r => r.json());

const TABS = ['tickets','new','facilities','schedule'];

function switchTab(n) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const idx = TABS.indexOf(n);
  if (idx >= 0) document.querySelectorAll('.tab')[idx].classList.add('active');
  document.getElementById('tab-' + n).classList.add('active');
  if (n === 'facilities') loadFacilities();
  if (n === 'schedule') renderSchedule();
}

function typeIcon(t) {
  if (!t) return '🔧';
  if (t.includes('كهرباء') || t.includes('إضاءة')) return '💡';
  if (t.includes('سباكة') || t.includes('مياه')) return '🚰';
  if (t.includes('تكييف')) return '❄️';
  if (t.includes('أمن') || t.includes('قفل')) return '🔐';
  if (t.includes('نظافة')) return '🧹';
  return '🔧';
}

function priorityBadge(p) {
  if (p === 'urgent' || p === 'emergency') return '<span class="badge badge-red">عاجلة</span>';
  return '<span class="badge badge-blue">عادية</span>';
}
function statusBadge(s) {
  if (s === 'closed') return '<span class="badge badge-green">مُغلَقة</span>';
  if (s === 'in_progress') return '<span class="badge badge-yellow">جارية</span>';
  return '<span class="badge badge-blue">مفتوحة</span>';
}

async function loadTickets() {
  try {
    const tickets = await q('maintenance_tickets', '?order=created_at.desc&limit=100');
    if (!Array.isArray(tickets)) throw new Error();
    const now = new Date();
    const thisMonth = now.getMonth(); const thisYear = now.getFullYear();
    const open = tickets.filter(t => t.status === 'open' || t.status === 'in_progress').length;
    const closed = tickets.filter(t => {
      if (t.status !== 'closed') return false;
      const d = new Date(t.created_at);
      return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
    }).length;
    const urgent = tickets.filter(t => t.priority === 'urgent' || t.priority === 'emergency').length;
    document.getElementById('kpiOpen').textContent = open;
    document.getElementById('kpiClosed').textContent = closed;
    document.getElementById('kpiUrgent').textContent = urgent;
    document.getElementById('kpiTotal').textContent = tickets.length;
    const el = document.getElementById('ticketsList');
    if (tickets.length === 0) { el.innerHTML = '<div class="empty-msg">✅ لا تذاكر صيانة مفتوحة</div>'; return; }
    el.innerHTML = tickets.map(t => `
      <div class="ticket-item">
        <div class="ticket-icon" style="background:#fef3c7">${typeIcon(t.ticket_type || t.title)}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:.9rem">${t.title || t.ticket_type || '—'}</div>
          <div style="font-size:.75rem;color:var(--text2)">📍 ${t.location || '—'} · ${t.created_at ? new Date(t.created_at).toLocaleDateString('ar') : ''}</div>
          ${t.description ? '<div style="font-size:.78rem;color:var(--text2);margin-top:3px">'+t.description.substring(0,80)+'</div>' : ''}
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
          ${priorityBadge(t.priority)} ${statusBadge(t.status)}
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('ticketsList').innerHTML = '<div class="error-msg">تعذّر تحميل التذاكر</div>';
  }
}

async function submitTicket() {
  const loc = document.getElementById('mLocation').value.trim();
  if (!loc) { showToast('⚠️ أدخل/ي موقع المشكلة'); return; }
  try {
    const resp = await fetch(`${SB_URL}/rest/v1/maintenance_tickets`, {
      method: 'POST',
      headers: {...H(), 'Prefer': 'return=minimal'},
      body: JSON.stringify({
        title: document.getElementById('mType').value,
        ticket_type: document.getElementById('mType').value,
        location: loc,
        priority: document.getElementById('mPriority').value,
        description: document.getElementById('mDesc').value,
        status: 'open'
      })
    });
    if (resp.ok) {
      showToast('✅ تم رفع تذكرة الصيانة');
      document.getElementById('mLocation').value = '';
      document.getElementById('mDesc').value = '';
      switchTab('tickets');
      loadTickets();
    } else { showToast('⚠️ تعذّر الرفع — تحقق من الصلاحيات'); }
  } catch(e) { showToast('❌ خطأ في الاتصال'); }
}

async function loadFacilities() {
  const el = document.getElementById('facilitiesContent');
  try {
    const tickets = await q('maintenance_tickets', '?status=neq.closed&limit=50');
    const facilities = [
      {f:'المبنى الرئيسي',issues: Array.isArray(tickets) ? tickets.filter(t=>(t.location||'').includes('رئيس')).length : 0},
      {f:'مختبر الحاسوب',issues: Array.isArray(tickets) ? tickets.filter(t=>(t.location||'').includes('مختبر')).length : 0},
      {f:'الملعب',issues: Array.isArray(tickets) ? tickets.filter(t=>(t.location||'').includes('ملعب')).length : 0},
      {f:'المقصف',issues: Array.isArray(tickets) ? tickets.filter(t=>(t.location||'').includes('مقصف')).length : 0},
      {f:'دورات المياه',issues: Array.isArray(tickets) ? tickets.filter(t=>(t.location||'').includes('مياه') || (t.ticket_type||'').includes('سباكة')).length : 0},
    ];
    el.innerHTML = `<div class="tbl-wrap"><table><thead><tr><th>المرفق</th><th>الحالة</th><th>تذاكر مفتوحة</th></tr></thead><tbody>
      ${facilities.map(f => `<tr>
        <td>${f.f}</td>
        <td><span class="badge ${f.issues===0?'badge-green':'badge-yellow'}">${f.issues===0?'سليم':'يحتاج انتباه'}</span></td>
        <td style="font-weight:700;color:${f.issues>0?'#d97706':'#16a34a'}">${f.issues}</td>
      </tr>`).join('')}
    </tbody></table></div>`;
  } catch(e) { el.innerHTML = '<div class="error-msg">تعذّر تحميل المرافق</div>'; }
}

function renderSchedule() {
  const items = [
    {task:'فحص نظام الإضاءة الكامل', freq:'شهري', next:'2026-07-15'},
    {task:'صيانة أجهزة التكييف', freq:'فصلي', next:'2026-08-01'},
    {task:'فحص شبكة المياه والسباكة', freq:'شهري', next:'2026-07-10'},
    {task:'صيانة الأثاث والمقاعد', freq:'فصلي', next:'2026-08-10'},
    {task:'فحص المولدات الاحتياطية', freq:'شهري', next:'2026-07-20'},
    {task:'تنظيف خزانات المياه', freq:'فصلي', next:'2026-08-01'}
  ];
  document.getElementById('scheduleContent').innerHTML = items.map(s => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-weight:700;font-size:.88rem">🔧 ${s.task}</div>
        <div style="font-size:.75rem;color:var(--text2)">${s.freq}</div>
      </div>
      <div style="text-align:left">
        <div style="font-size:.78rem;font-weight:700">${s.next}</div>
        <span class="badge badge-blue">مجدول</span>
      </div>
    </div>`).join('');
}

function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

loadTickets();
</script>
</body>
</html>
