<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>لوحة التمريض — EduOS Nursing</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<script src="../platform-lang.js" defer></script>
<script src="/apps/platform-config.js"></script>
<script src="/apps/platform-autologout.js"></script>
<script src="/apps/platform-shield.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    margin: 0;
    padding: 0;font-family:'Tajawal',Arial,sans-serif;background:#F0F4F8;color:#1e293b;min-height:100vh;direction:rtl}
:root{--pr:#6C3DD6;--sc:#22D3EE;--card:#fff;--bd:#e2e8f0;--tx:#1e293b;--tx2:#64748b}
.hdr{background:linear-gradient(135deg,#1e293b,#0f172a);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{background:linear-gradient(135deg,#ef4444,#f97316);border-radius:10px;padding:8px 14px;font-size:1.4rem;font-weight:900;color:#fff}
.hdr-text h1{color:#fff;font-size:1rem;font-weight:700}
.hdr-text p{color:rgba(255,255,255,.6);font-size:.73rem}
.btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:6px 14px;cursor:pointer;font-family:inherit;font-size:.78rem}
.main{padding:24px;max-width:1300px;margin:0 auto}
.tabs{display:flex;gap:8px;margin-bottom:20px;background:#fff;border-radius:12px;padding:6px;border:1px solid var(--bd);width:fit-content}
.tab{padding:8px 20px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--tx2);transition:.2s;border:none;background:none;font-family:inherit}
.tab.active{background:linear-gradient(135deg,#ef4444,#f97316);color:#fff}
.tab-panel{display:none}.tab-panel.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--card);border-radius:14px;padding:18px;border:1px solid var(--bd);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.kpi-icon{font-size:1.8rem;margin-bottom:8px}
.kpi-val{font-size:1.8rem;font-weight:900;margin-bottom:2px}
.kpi-label{font-size:.75rem;color:var(--tx2)}
.kpi.red{border-color:#fca5a5;background:#fff5f5}.kpi.red .kpi-val{color:#dc2626}
.kpi.green{border-color:#86efac;background:#f0fdf4}.kpi.green .kpi-val{color:#16a34a}
.kpi.blue{border-color:#93c5fd;background:#eff6ff}.kpi.blue .kpi-val{color:#1d4ed8}
.kpi.amber{border-color:#fcd34d;background:#fffbeb}.kpi.amber .kpi-val{color:#d97706}
.card{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--bd);box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:16px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:.78rem;font-weight:600;color:var(--tx2)}
.form-group input,.form-group select,.form-group textarea{border:1.5px solid var(--bd);border-radius:8px;padding:9px 12px;font-family:inherit;font-size:.85rem;color:var(--tx);background:#fff;outline:none;transition:.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.1)}
.form-full{grid-column:1/-1}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:700;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#ef4444,#f97316);color:#fff;box-shadow:0 2px 8px rgba(239,68,68,.3)}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:#f1f5f9;color:var(--tx2);border:1px solid var(--bd)}
.btn-sm{padding:5px 12px;font-size:.75rem}
.search-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.search-bar input,.search-bar select{border:1.5px solid var(--bd);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:.84rem;outline:none}
.search-bar input{flex:1;min-width:180px}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:#fff5f5;padding:11px 14px;text-align:right;font-weight:700;color:var(--tx2);border-bottom:2px solid #fca5a5;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fff8f8}
.badge{padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700}
.badge-red{background:#fee2e2;color:#dc2626}
.badge-green{background:#dcfce7;color:#16a34a}
.badge-amber{background:#fef3c7;color:#d97706}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.empty{text-align:center;padding:40px;color:var(--tx2)}
.empty-icon{font-size:2.5rem;margin-bottom:10px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:10px;padding:12px 24px;font-size:.85rem;font-weight:600;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.3)}
</style>
</head>
<body>

<div id="toast"></div>

<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">🏥</div>
    <div class="hdr-text">
      <h1>لوحة التمريض | Nursing Dashboard</h1>
      <p>بوابة الجود الذكية — <span id="hdUser">جار التحميل...</span></p>
    </div>
  </div>
  <button class="btn-logout" onclick="logout()">خروج</button>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('today','this')">🏥 زيارات اليوم</button>
    <button class="tab" onclick="switchTab('new','this')">➕ تسجيل زيارة</button>
    <button class="tab" onclick="switchTab('history','this')">📋 السجل الكامل</button>
  </div>

  <!-- TODAY -->
  <div id="tab-today" class="tab-panel active">
    <div class="kpi-grid">
      <div class="kpi blue"><div class="kpi-icon">📋</div><div class="kpi-val" id="kpiTotal">—</div><div class="kpi-label">إجمالي الزيارات اليوم</div></div>
      <div class="kpi red"><div class="kpi-icon">🚨</div><div class="kpi-val" id="kpiUrgent">—</div><div class="kpi-label">حالات عاجلة</div></div>
      <div class="kpi amber"><div class="kpi-icon">🏠</div><div class="kpi-val" id="kpiHome">—</div><div class="kpi-label">أُرسل/ت للمنزل</div></div>
      <div class="kpi green"><div class="kpi-icon">📞</div><div class="kpi-val" id="kpiParent">—</div><div class="kpi-label">أُبلغ ولي/ة الأمر</div></div>
    </div>

    <div class="search-bar">
      <input type="text" id="searchToday" placeholder="🔍 ابحث باسم الطالب/ة أو الصف..." oninput="filterToday()"/>
      <button class="btn btn-primary btn-sm" onclick="loadToday()">🔄 تحديث</button>
    </div>

    <div class="card">
      <div class="card-hdr"><span class="card-title">🏥 زيارات اليوم</span></div>
      <div id="todayList"><div class="empty"><div class="empty-icon">⏳</div>جار التحميل...</div></div>
    </div>
  </div>

  <!-- NEW VISIT -->
  <div id="tab-new" class="tab-panel">
    <div class="card">
      <div class="card-hdr"><span class="card-title">➕ تسجيل زيارة جديدة</span></div>
      <div class="form-grid">
        <div class="form-group">
          <label>اسم الطالب/ة *</label>
          <input type="text" id="nStudent" placeholder="اسم الطالب/ة كاملاً"/>
        </div>
        <div class="form-group">
          <label>الصف *</label>
          <input type="text" id="nClass" placeholder="مثال: 3أ"/>
        </div>
        <div class="form-group">
          <label>الشكوى / الأعراض *</label>
          <select id="nComplaint">
            <option value="">-- اختر --</option>
            <option>صداع</option>
            <option>ألم في البطن</option>
            <option>غثيان وقيء</option>
            <option>إرهاق وإغماء</option>
            <option>جرح أو إصابة</option>
            <option>حساسية</option>
            <option>ألم عام</option>
            <option>حالة مزمنة</option>
            <option>أخرى</option>
          </select>
        </div>
        <div class="form-group">
          <label>الإجراء المتخذ *</label>
          <select id="nAction">
            <option value="">-- اختر --</option>
            <option value="rest">استراحة في العيادة</option>
            <option value="medicine">دواء + استراحة</option>
            <option value="sent_home">إرسال للمنزل</option>
            <option value="first_aid">إسعاف أولي</option>
            <option value="referral">إحالة طارئة</option>
          </select>
        </div>
        <div class="form-group">
          <label>دواء قُدِّم</label>
          <input type="text" id="nMedicine" placeholder="اسم الدواء إن وُجد"/>
        </div>
        <div class="form-group">
          <label>وقت الزيارة</label>
          <input type="time" id="nTime"/>
        </div>
        <div class="form-group">
          <label>أُبلغ ولي/ة الأمر؟</label>
          <select id="nParent">
            <option value="false">لا</option>
            <option value="true">نعم</option>
          </select>
        </div>
        <div class="form-group">
          <label>أُرسل/ت للمنزل؟</label>
          <select id="nHome">
            <option value="false">لا</option>
            <option value="true">نعم</option>
          </select>
        </div>
        <div class="form-group form-full">
          <label>ملاحظات</label>
          <textarea id="nNotes" rows="2" placeholder="أي ملاحظات إضافية..."></textarea>
        </div>
      </div>
      <div style="margin-top:16px;display:flex;gap:10px;">
        <button class="btn btn-primary" onclick="saveVisit()">💾 حفظ الزيارة</button>
        <button class="btn btn-secondary" onclick="clearForm()">🗑️ مسح</button>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="tab-history" class="tab-panel">
    <div class="search-bar">
      <input type="text" id="searchHist" placeholder="🔍 ابحث في السجل..." oninput="filterHistory()"/>
      <select id="filterAction" onchange="filterHistory()" style="border:1.5px solid var(--bd);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:.82rem">
        <option value="">جميع الإجراءات</option>
        <option value="rest">استراحة</option>
        <option value="medicine">دواء</option>
        <option value="sent_home">أُرسل للمنزل</option>
        <option value="first_aid">إسعاف أولي</option>
        <option value="referral">إحالة</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="loadHistory()">🔄 تحديث</button>
    </div>
    <div class="card">
      <div id="histList"><div class="empty"><div class="empty-icon">⏳</div>جار التحميل...</div></div>
    </div>
  </div>
</div>

<script>
const SB_URL = window.EduOS?.SB_URL || '';
const SB_KEY = window.EduOS?.SB_KEY || '';
const HDR = { 'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY };
let allToday=[], allHistory=[], currentUser={};

function getSession(){ try{return JSON.parse(sessionStorage.getItem('edoos_user')||'{}');}catch{return {};} }
function logout(){ sessionStorage.removeItem('edoos_user'); location.href='/apps/eduos-login/'; }

document.addEventListener('DOMContentLoaded', async () => {
  currentUser = getSession();
  if(!currentUser||!currentUser.id){ location.href='/apps/eduos-login/'; return; }
  document.getElementById('hdUser').textContent = currentUser.name || 'ممرضة/ممرض';
  const now = new Date();
  document.getElementById('nTime').value = now.toTimeString().slice(0,5);
  await loadToday();
  await loadHistory();
});

async function loadToday(){
  const today = new Date().toISOString().split('T')[0];
  try{
    const r = await fetch(`${SB_URL}/rest/v1/nursing_visits?visit_date=eq.${today}&order=created_at.desc&limit=100`,{headers:HDR});
    allToday = await r.json();
    if(!Array.isArray(allToday)) allToday=[];
    renderKPIs(allToday);
    renderTodayTable(allToday);
  }catch(e){
    document.getElementById('todayList').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div>تعذّر تحميل البيانات</div>`;
  }
}

async function loadHistory(){
  try{
    const r = await fetch(`${SB_URL}/rest/v1/nursing_visits?order=created_at.desc&limit=300`,{headers:HDR});
    allHistory = await r.json();
    if(!Array.isArray(allHistory)) allHistory=[];
    renderHistTable(allHistory);
  }catch(e){}
}

function renderKPIs(data){
  document.getElementById('kpiTotal').textContent = data.length;
  document.getElementById('kpiUrgent').textContent = data.filter(v=>v.action_taken==='referral'||v.action_taken==='first_aid').length;
  document.getElementById('kpiHome').textContent = data.filter(v=>v.sent_home).length;
  document.getElementById('kpiParent').textContent = data.filter(v=>v.parent_notified).length;
}

function renderTodayTable(data){
  const el=document.getElementById('todayList');
  if(!data||data.length===0){ el.innerHTML=`<div class="empty"><div class="empty-icon">🏥</div><p>لا زيارات مسجّلة اليوم</p><p style="font-size:.8rem;color:var(--tx2);margin-top:8px">استخدم تبويب "تسجيل زيارة" لإضافة أول زيارة</p></div>`; return; }
  el.innerHTML=`<div class="tbl-wrap"><table>
    <thead><tr><th>#</th><th>الطالب/ة</th><th>الصف</th><th>الشكوى</th><th>الإجراء</th><th>الوقت</th><th>ولي الأمر</th><th>المنزل</th></tr></thead>
    <tbody>${data.map((v,i)=>`
      <tr>
        <td>${i+1}</td>
        <td><strong>${v.student_name||'—'}</strong></td>
        <td>${v.class_name||'—'}</td>
        <td>${v.complaint||'—'}</td>
        <td>${actionBadge(v.action_taken)}</td>
        <td style="font-size:.78rem">${v.visit_time||'—'}</td>
        <td>${v.parent_notified?'<span class="badge badge-green">نعم</span>':'<span class="badge badge-amber">لا</span>'}</td>
        <td>${v.sent_home?'<span class="badge badge-red">نعم</span>':'—'}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

function renderHistTable(data){
  const el=document.getElementById('histList');
  if(!data||data.length===0){ el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><p>السجل فارغ</p></div>`; return; }
  el.innerHTML=`<div class="tbl-wrap"><table>
    <thead><tr><th>#</th><th>الطالب/ة</th><th>الصف</th><th>الشكوى</th><th>الإجراء</th><th>التاريخ</th><th>الوقت</th><th>ولي الأمر</th></tr></thead>
    <tbody>${data.map((v,i)=>`
      <tr>
        <td>${i+1}</td>
        <td><strong>${v.student_name||'—'}</strong></td>
        <td>${v.class_name||'—'}</td>
        <td>${v.complaint||'—'}</td>
        <td>${actionBadge(v.action_taken)}</td>
        <td style="font-size:.78rem">${v.visit_date||'—'}</td>
        <td style="font-size:.78rem">${v.visit_time||'—'}</td>
        <td>${v.parent_notified?'<span class="badge badge-green">نعم</span>':'—'}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

async function saveVisit(){
  const student=document.getElementById('nStudent').value.trim();
  const cls=document.getElementById('nClass').value.trim();
  const complaint=document.getElementById('nComplaint').value;
  const action=document.getElementById('nAction').value;
  if(!student){showToast('❌ أدخل/ي اسم الطالب/ة');return;}
  if(!complaint){showToast('❌ اختر/ي الشكوى');return;}
  if(!action){showToast('❌ اختر/ي الإجراء');return;}

  const today=new Date().toISOString().split('T')[0];
  const payload={
    student_name:student, class_name:cls||null,
    complaint, action_taken:action,
    medicine_given:document.getElementById('nMedicine').value.trim()||null,
    visit_date:today, visit_time:document.getElementById('nTime').value||null,
    parent_notified:document.getElementById('nParent').value==='true',
    sent_home:document.getElementById('nHome').value==='true',
    notes:document.getElementById('nNotes').value.trim()||null,
    created_by:currentUser.name||null
  };

  try{
    const r=await fetch(`${SB_URL}/rest/v1/nursing_visits`,{
      method:'POST', headers:{...HDR,'Prefer':'return=minimal'}, body:JSON.stringify(payload)
    });
    if(r.ok||r.status===201){
      showToast('✅ تم حفظ الزيارة بنجاح');
      clearForm();
      await loadToday();
      switchTab('today',null);
    } else {
      const err=await r.json();
      showToast('❌ خطأ: '+(err.message||r.status));
    }
  }catch(e){ showToast('❌ تعذّر الاتصال بالخادم'); }
}

function clearForm(){
  ['nStudent','nClass','nMedicine','nNotes'].forEach(id=>document.getElementById(id).value='');
  ['nComplaint','nAction'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('nParent').value='false';
  document.getElementById('nHome').value='false';
  const now=new Date(); document.getElementById('nTime').value=now.toTimeString().slice(0,5);
}

function filterToday(){
  const q=document.getElementById('searchToday').value.toLowerCase();
  renderTodayTable(allToday.filter(v=>
    (v.student_name||'').toLowerCase().includes(q)||(v.class_name||'').toLowerCase().includes(q)
  ));
}

function filterHistory(){
  const q=document.getElementById('searchHist').value.toLowerCase();
  const act=document.getElementById('filterAction').value;
  renderHistTable(allHistory.filter(v=>
    (!q||(v.student_name||'').toLowerCase().includes(q)||(v.class_name||'').toLowerCase().includes(q))&&
    (!act||v.action_taken===act)
  ));
}

function switchTab(id,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if(btn==='this') event.target.classList.add('active');
}

function actionBadge(a){
  const map={rest:['badge-blue','استراحة'],medicine:['badge-amber','دواء'],sent_home:['badge-red','أُرسل للمنزل'],first_aid:['badge-amber','إسعاف أولي'],referral:['badge-red','إحالة']};
  const [cls,lbl]=map[a]||['badge-blue',a||'—'];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}
</script>
</body>
</html>
