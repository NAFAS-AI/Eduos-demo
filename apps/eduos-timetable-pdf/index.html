<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>طباعة الجدول — EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<script src="/apps/platform-autologout.js"></script>
<script src="/apps/platform-config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',Arial,sans-serif;background:#F0F4F8;color:#1e293b;min-height:100vh;direction:rtl}
:root{--primary:#6C3DD6;--secondary:#22D3EE;--border:#e2e8f0;--text:#1e293b;--text2:#64748b}
.hdr{background:linear-gradient(135deg,#6C3DD6,#22D3EE);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(108,61,214,.25)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{background:rgba(255,255,255,.2);border-radius:10px;padding:8px 14px;font-size:1.4rem;font-weight:900;color:#fff}
.hdr-title{color:#fff;font-size:1rem;font-weight:700}
.hdr-sub{color:rgba(255,255,255,.8);font-size:.75rem}
.btn-hdr{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 14px;cursor:pointer;font-family:'Tajawal',Arial,sans-serif;font-size:.82rem;font-weight:600;transition:.2s;white-space:nowrap}
.btn-hdr:hover{background:rgba(255,255,255,.3)}
/* ===== RESPONSIVE CONTROLS ===== */
.controls{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.controls-selects{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.controls-btns{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
select{background:#fff;border:1.5px solid var(--border);border-radius:8px;color:var(--text);padding:7px 12px;font-family:'Tajawal',Arial,sans-serif;font-size:.85rem;min-width:160px;cursor:pointer}
select:focus{outline:none;border-color:var(--primary)}
.btn{padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Tajawal',Arial,sans-serif;font-size:.85rem;font-weight:700;transition:.2s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
/* ===== MAIN ===== */
.main{padding:24px;max-width:1050px;margin:0 auto}
.print-sheet{background:#fff;border-radius:14px;padding:30px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.08)}
.print-header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:3px solid #6C3DD6}
.print-logo{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff;border-radius:12px;padding:10px 20px;font-size:1.2rem;font-weight:900;display:inline-block;margin-bottom:8px}
.print-school{font-size:1rem;font-weight:700;margin-bottom:6px}
.print-meta{font-size:.78rem;color:var(--text2);display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-top:6px}
/* ===== TABLE ===== */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:500px}
thead{background:linear-gradient(135deg,#6C3DD6,#22D3EE)}
th{padding:10px 8px;text-align:center;font-weight:700;color:#fff;border:1px solid rgba(255,255,255,.2);font-size:.82rem;white-space:nowrap}
td{padding:8px 6px;border:1px solid var(--border);text-align:center;vertical-align:middle}
.period-cell{background:#F8FAFF;font-weight:700;font-size:.7rem;color:var(--text2);white-space:nowrap;width:80px}
.period-num{font-size:.9rem;font-weight:900;color:var(--primary);display:block}
.subject-pill{border-radius:6px;padding:5px 8px;font-size:.72rem;font-weight:700;line-height:1.4;display:block}
.teacher-lbl{font-size:.62rem;color:#64748b;margin-top:3px;display:block;font-weight:400}
.break-row td{background:#fef3c7;text-align:center;font-size:.72rem;font-weight:700;color:#d97706;padding:6px}
.print-footer{margin-top:16px;text-align:center;font-size:.68rem;color:var(--text2);border-top:1px solid var(--border);padding-top:10px;line-height:1.6}
/* ===== STATES ===== */
.state-box{text-align:center;padding:48px 24px;color:#94a3b8}
.state-icon{font-size:3rem;display:block;margin-bottom:12px}
.state-title{font-size:1rem;font-weight:700;color:#64748b}
.state-hint{font-size:.82rem;margin-top:6px}
/* ===== TOAST ===== */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:10px;padding:12px 24px;font-size:.88rem;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  .controls{flex-direction:column;align-items:stretch}
  .controls-selects,.controls-btns{width:100%}
  .controls-selects{flex-direction:column}
  .controls-btns{justify-content:flex-start}
  select{width:100%;min-width:unset}
  .main{padding:12px}
  .print-sheet{padding:16px}
  .hdr-sub{display:none}
}
/* ===== PRINT ===== */
@media print{
  .hdr,.controls,.toast{display:none!important}
  body{background:#fff}
  .main{padding:0;max-width:100%}
  .print-sheet{box-shadow:none;border:none;padding:10px}
  table{font-size:.7rem}
}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">🖨️</div>
    <div>
      <div class="hdr-title">طباعة الجدول | Print Timetable</div>
      <div class="hdr-sub">تصدير الجدول الدراسي — EduOS</div>
    </div>
  </div>
  <button class="btn-hdr" id="btnBack">← الجدول</button>
</header>

<div class="controls">
  <div class="controls-selects">
    <select id="classSelect">
      <option value="">اختر الصف... / Select Class</option>
    </select>
    <select id="termSelect">
      <option value="T3">الفصل الثالث 2025-2026</option>
      <option value="T2">الفصل الثاني 2025-2026</option>
      <option value="T1">الفصل الأول 2025-2026</option>
    </select>
  </div>
  <div class="controls-btns">
    <button class="btn btn-primary" id="btnPrint">🖨️ طباعة</button>
    <button class="btn btn-outline" id="btnPDF">📥 PDF</button>
    <button class="btn btn-outline" id="btnCopy">🔗 نسخ الرابط</button>
  </div>
</div>

<div class="main">
  <div class="print-sheet" id="printSheet">
    <div class="print-header">
      <div class="print-logo" id="printLogo">🎓 EduOS</div>
      <div class="print-school" id="printSchool"></div>
      <div class="print-meta" id="printMeta"></div>
    </div>
    <div id="timetableContainer">
      <div class="state-box">
        <span class="state-icon">📋</span>
        <div class="state-title">اختر الصف لعرض الجدول</div>
        <div class="state-hint">Select a class to view its timetable</div>
      </div>
    </div>
    <div class="print-footer" id="printFooter">
      تم التوليد تلقائياً بنظام EduOS &nbsp;&middot;&nbsp; NAFAS FOR ARTIFICIAL INTELLIGENCE &nbsp;&middot;&nbsp; CN-6573712 &nbsp;&middot;&nbsp; &copy; 2026 جميع الحقوق محفوظة
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  var SB_URL = (window.EduOS && window.EduOS.SB_URL) || '';
  var SB_KEY = (window.EduOS && window.EduOS.SB_KEY) || '';

  var DAYS = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس'];

  var COLORS = {
    'math':          { bg: '#ede9fe', t: '#6C3DD6' },
    'رياضيات':       { bg: '#ede9fe', t: '#6C3DD6' },
    'science':       { bg: '#dbeafe', t: '#1d4ed8' },
    'علوم':          { bg: '#dbeafe', t: '#1d4ed8' },
    'arabic':        { bg: '#dcfce7', t: '#16a34a' },
    'عربي':          { bg: '#dcfce7', t: '#16a34a' },
    'english':       { bg: '#ffedd5', t: '#c2410c' },
    'إنجليزي':       { bg: '#ffedd5', t: '#c2410c' },
    'islamic':       { bg: '#fef3c7', t: '#d97706' },
    'إسلامية':       { bg: '#fef3c7', t: '#d97706' },
    'social':        { bg: '#fce7f3', t: '#be185d' },
    'اجتماعيات':     { bg: '#fce7f3', t: '#be185d' },
    'pe':            { bg: '#e0f2fe', t: '#0284c7' },
    'تربية بدنية':   { bg: '#e0f2fe', t: '#0284c7' },
    'art':           { bg: '#f3e8ff', t: '#7c3aed' },
    'فنون':          { bg: '#f3e8ff', t: '#7c3aed' },
    'computer':      { bg: '#ecfdf5', t: '#059669' },
    'حاسوب':         { bg: '#ecfdf5', t: '#059669' },
    'تكنولوجيا':     { bg: '#ecfdf5', t: '#059669' }
  };

  function getColor(subj) {
    if (!subj) return { bg: '#f1f5f9', t: '#475569' };
    var k = subj.toLowerCase();
    if (COLORS[k]) return COLORS[k];
    var keys = Object.keys(COLORS);
    for (var i = 0; i < keys.length; i++) {
      if (k.indexOf(keys[i]) !== -1 || keys[i].indexOf(k) !== -1) return COLORS[keys[i]];
    }
    return { bg: '#f1f5f9', t: '#475569' };
  }

  function hdrs() {
    return { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };
  }

  function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 3000);
  }

  function setLoading() {
    document.getElementById('timetableContainer').innerHTML =
      '<div class="state-box"><span class="state-icon">⏳</span><div class="state-title">جارٍ التحميل...</div></div>';
  }

  function setEmpty(cls) {
    document.getElementById('timetableContainer').innerHTML =
      '<div class="state-box">' +
      '<span class="state-icon">📭</span>' +
      '<div class="state-title">لا يوجد جدول لهذا الصف</div>' +
      '<div class="state-hint">No timetable found for ' + cls + ' — run the Timetable Generator first</div>' +
      '</div>';
  }

  function loadClasses() {
    var url = SB_URL + '/rest/v1/students?select=class_name&order=class_name';
    fetch(url, { headers: hdrs() })
      .then(function(r) { return r.json(); })
      .then(function(rows) {
        if (!Array.isArray(rows)) return;
        var seen = {};
        var list = [];
        rows.forEach(function(r) {
          var c = (r.class_name || '').trim();
          if (c && !seen[c]) { seen[c] = true; list.push(c); }
        });
        list.sort(function(a, b) {
          var an = parseInt(a) || 999;
          var bn = parseInt(b) || 999;
          if (an !== bn) return an - bn;
          return a.localeCompare(b);
        });
        var sel = document.getElementById('classSelect');
        list.forEach(function(c) {
          var o = document.createElement('option');
          o.value = c;
          o.textContent = c;
          sel.appendChild(o);
        });
        var hash = window.location.hash.replace('#', '');
        if (hash && seen[hash]) { sel.value = hash; loadTimetable(); }
      })
      .catch(function(e) { console.error('loadClasses', e); });
  }

  function loadTimetable() {
    var cls = document.getElementById('classSelect').value;
    if (!cls) return;
    window.location.hash = cls;

    var termSel = document.getElementById('termSelect');
    var termText = termSel.options[termSel.selectedIndex].text;

    var schoolName = (window.EduOS && window.EduOS.SCHOOL_NAME) || '';
    document.getElementById('printLogo').textContent = '🎓 EduOS' + (schoolName ? ' — ' + schoolName : '');
    document.getElementById('printSchool').textContent = schoolName;
    document.getElementById('printMeta').innerHTML =
      '<span>📚 ' + termText + '</span>' +
      '<span>🏫 ' + cls + '</span>' +
      '<span>📅 أحد–خميس</span>';

    setLoading();

    var url = SB_URL + '/rest/v1/schedules?select=*&class_name=eq.' + encodeURIComponent(cls) + '&order=period.asc,day.asc';
    fetch(url, { headers: hdrs() })
      .then(function(r) { return r.json(); })
      .then(function(rows) {
        if (!Array.isArray(rows) || rows.length === 0) { setEmpty(cls); return; }
        renderTable(rows, cls);
      })
      .catch(function() { setEmpty(cls); });
  }

  function renderTable(rows, cls) {
    var matrix = {};
    var periodMeta = {};
    var maxP = 0;

    rows.forEach(function(r) {
      var p = parseInt(r.period);
      var d = r.day;
      if (!p || !d) return;
      if (!matrix[p]) matrix[p] = {};
      matrix[p][d] = { subj: r.subject || '', teacher: r.teacher_name || '' };
      if (!periodMeta[p]) periodMeta[p] = { start: r.time_start || '', end: r.time_end || '' };
      if (p > maxP) maxP = p;
    });

    if (!maxP) { setEmpty(cls); return; }

    var html = '<div class="tbl-wrap"><table><thead><tr><th>الحصة</th>';
    DAYS.forEach(function(d) { html += '<th>' + d + '</th>'; });
    html += '</tr></thead><tbody>';

    for (var p = 1; p <= maxP; p++) {
      var meta = periodMeta[p] || {};
      var timeStr = (meta.start && meta.end) ? (meta.start + '\u2013' + meta.end) : ('حصة ' + p);
      html += '<tr><td class="period-cell"><span class="period-num">' + p + '</span>' + timeStr + '</td>';
      DAYS.forEach(function(d) {
        var cell = matrix[p] && matrix[p][d];
        if (cell && cell.subj) {
          var sc = getColor(cell.subj);
          html += '<td>';
          html += '<span class="subject-pill" style="background:' + sc.bg + ';color:' + sc.t + '">' + cell.subj + '</span>';
          if (cell.teacher) { html += '<span class="teacher-lbl">' + cell.teacher + '</span>'; }
          html += '</td>';
        } else {
          html += '<td></td>';
        }
      });
      html += '</tr>';
    }

    html += '</tbody></table></div>';
    document.getElementById('timetableContainer').innerHTML = html;
  }

  document.getElementById('classSelect').addEventListener('change', loadTimetable);
  document.getElementById('termSelect').addEventListener('change', function() {
    if (document.getElementById('classSelect').value) loadTimetable();
  });
  document.getElementById('btnBack').addEventListener('click', function() {
    location.href = '/apps/eduos-timetable/';
  });
  document.getElementById('btnPrint').addEventListener('click', function() {
    window.print();
  });
  document.getElementById('btnPDF').addEventListener('click', function() {
    showToast('⏳ جارٍ التصدير...');
    setTimeout(function() { window.print(); }, 400);
  });
  document.getElementById('btnCopy').addEventListener('click', function() {
    var url = window.location.href;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(function() { showToast('📋 تم نسخ الرابط'); });
    } else {
      showToast('📋 ' + url);
    }
  });

  loadClasses();
})();
</script>
</body>
</html>
