<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>طباعة الجدول — EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<script src="/apps/platform-autologout.js"></script>
<script src="/apps/platform-config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',Arial,sans-serif;background:#F0F4F8;color:#1e293b;min-height:100vh;direction:rtl}
:root{--brand:#6C3DD6;--brand2:#22D3EE;--border:#e2e8f0;--text:#1e293b;--text2:#64748b;--surface:#fff;--surface2:#F8FAFF}
.hdr{background:linear-gradient(135deg,#6C3DD6,#22D3EE);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(108,61,214,.25)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{background:rgba(255,255,255,.2);border-radius:10px;padding:8px 14px;font-size:1.4rem;font-weight:900;color:#fff}
.hdr-title{color:#fff;font-size:1rem;font-weight:700}
.hdr-sub{color:rgba(255,255,255,.8);font-size:.75rem}
.btn-hdr{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 14px;cursor:pointer;font-family:'Tajawal',Arial,sans-serif;font-size:.82rem;font-weight:600;transition:.2s}
.btn-hdr:hover{background:rgba(255,255,255,.35)}
/* CONTROLS */
.controls{background:#fff;border-bottom:2px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.mode-tabs{display:flex;gap:6px;flex-wrap:wrap}
.mode-tab{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--text2);font-family:'Tajawal',Arial,sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap}
.mode-tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.mode-tab:hover:not(.active){border-color:var(--brand);color:var(--brand)}
.ctrl-right{margin-right:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
select{background:#fff;border:1.5px solid var(--border);border-radius:8px;color:var(--text);padding:7px 12px;font-family:'Tajawal',Arial,sans-serif;font-size:.85rem;min-width:160px;cursor:pointer}
select:focus{outline:none;border-color:var(--brand)}
.btn{padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Tajawal',Arial,sans-serif;font-size:.85rem;font-weight:700;transition:.2s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--brand);color:var(--brand)}
/* MAIN */
.main{padding:24px;max-width:1100px;margin:0 auto}
.print-sheet{background:#fff;border-radius:14px;padding:30px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.08)}
.print-header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:3px solid #6C3DD6}
.print-logo{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff;border-radius:12px;padding:10px 20px;font-size:1.2rem;font-weight:900;display:inline-block;margin-bottom:8px}
.print-school{font-size:1rem;font-weight:700;margin-bottom:6px}
.print-meta{font-size:.78rem;color:var(--text2);display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-top:6px}
/* TABLE */
.tbl-wrap{overflow-x:auto;margin-bottom:28px}
.tbl-title{font-size:.95rem;font-weight:800;color:var(--brand);margin-bottom:8px;padding:6px 10px;background:var(--surface2);border-radius:8px;border-right:4px solid var(--brand)}
table{width:100%;border-collapse:collapse;min-width:500px}
thead{background:linear-gradient(135deg,#6C3DD6,#22D3EE)}
th{padding:10px 8px;text-align:center;font-weight:700;color:#fff;border:1px solid rgba(255,255,255,.2);font-size:.82rem;white-space:nowrap}
td{padding:8px 6px;border:1px solid var(--border);text-align:center;vertical-align:middle}
.period-cell{background:#F8FAFF;font-weight:700;font-size:.7rem;color:var(--text2);white-space:nowrap;width:60px}
.period-num{font-size:.9rem;font-weight:900;color:var(--brand);display:block}
.subject-pill{border-radius:6px;padding:5px 8px;font-size:.72rem;font-weight:700;line-height:1.4;display:block}
.teacher-lbl{font-size:.62rem;color:#64748b;margin-top:3px;display:block}
.print-footer{margin-top:16px;text-align:center;font-size:.68rem;color:var(--text2);border-top:1px solid var(--border);padding-top:10px;line-height:1.6}
/* STATES */
.state-box{text-align:center;padding:48px 24px;color:#94a3b8}
.state-icon{font-size:3rem;display:block;margin-bottom:12px}
.state-title{font-size:1rem;font-weight:700;color:#64748b}
.state-hint{font-size:.82rem;margin-top:6px}
/* TOAST */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:10px;padding:12px 24px;font-size:.88rem;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:640px){
  .controls{flex-direction:column;align-items:stretch}
  .ctrl-right{margin-right:0}
  .main{padding:12px}
  .print-sheet{padding:16px}
}
@media print{
  .hdr,.controls,.toast{display:none!important}
  body{background:#fff}
  .main{padding:0;max-width:100%}
  .print-sheet{box-shadow:none;border:none;padding:10px}
  table{font-size:.7rem}
  .tbl-wrap{page-break-inside:avoid}
}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">🖨️</div>
    <div>
      <div class="hdr-title">طباعة الجدول | Print Timetable</div>
      <div class="hdr-sub">تصدير الجدول الدراسي — EduOS</div>
    </div>
  </div>
  <button class="btn-hdr" id="btnBack">← الجدول | Timetable</button>
</header>

<div class="controls">
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="class">📚 بحسب الصف | By Class</button>
    <button class="mode-tab" data-mode="teacher">👤 بحسب المعلم | By Teacher</button>
    <button class="mode-tab" data-mode="grade">🎓 بحسب المرحلة | By Grade</button>
    <button class="mode-tab" data-mode="all">📋 جميع الفصول | All Classes</button>
  </div>
  <div class="ctrl-right">
    <select id="filterSelect">
      <option value="">اختر... / Select</option>
    </select>
    <button class="btn btn-primary" id="btnPrint">🖨️ طباعة | Print</button>
    <button class="btn btn-outline" id="btnPDF">📥 PDF</button>
  </div>
</div>

<div class="main">
  <div class="print-sheet" id="printSheet">
    <div class="print-header">
      <div class="print-logo" id="printLogo">🎓 EduOS</div>
      <div class="print-school" id="printSchool"></div>
      <div class="print-meta" id="printMeta"></div>
    </div>
    <div id="timetableContainer">
      <div class="state-box">
        <span class="state-icon">📋</span>
        <div class="state-title">اختر وضع الطباعة ثم الفلتر</div>
        <div class="state-hint">Select a print mode then a filter to view the timetable</div>
      </div>
    </div>
    <div class="print-footer">
      تم التوليد تلقائياً بنظام EduOS &nbsp;&middot;&nbsp; NAFAS FOR ARTIFICIAL INTELLIGENCE &nbsp;&middot;&nbsp; CN-6573712 &nbsp;&middot;&nbsp; &copy; 2026 جميع الحقوق محفوظة
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  var SB_URL = (window.EduOS && window.EduOS.SB_URL) || '';
  var SB_KEY = (window.EduOS && window.EduOS.SB_KEY) || '';
  var DAYS = ['الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة'];
  var DAYS_EN = ['Mon','Tue','Wed','Thu','Fri'];
  var currentMode = 'class';
  var allScheduleRows = [];

  var COLORS = {
    'رياضيات':{'bg':'#ede9fe','t':'#6C3DD6'},'math':{'bg':'#ede9fe','t':'#6C3DD6'},
    'علوم':{'bg':'#dbeafe','t':'#1d4ed8'},'science':{'bg':'#dbeafe','t':'#1d4ed8'},
    'عربي':{'bg':'#dcfce7','t':'#16a34a'},'arabic':{'bg':'#dcfce7','t':'#16a34a'},
    'إنجليزي':{'bg':'#ffedd5','t':'#c2410c'},'english':{'bg':'#ffedd5','t':'#c2410c'},
    'إسلامية':{'bg':'#fef3c7','t':'#d97706'},'islamic':{'bg':'#fef3c7','t':'#d97706'},
    'اجتماعيات':{'bg':'#fce7f3','t':'#be185d'},'social':{'bg':'#fce7f3','t':'#be185d'},
    'تربية بدنية':{'bg':'#e0f2fe','t':'#0284c7'},'pe':{'bg':'#e0f2fe','t':'#0284c7'},
    'فنون':{'bg':'#f3e8ff','t':'#7c3aed'},'art':{'bg':'#f3e8ff','t':'#7c3aed'},
    'حاسوب':{'bg':'#ecfdf5','t':'#059669'},'computer':{'bg':'#ecfdf5','t':'#059669'},
    'تكنولوجيا':{'bg':'#ecfdf5','t':'#059669'}
  };

  function getColor(subj) {
    if (!subj) return {bg:'#f1f5f9',t:'#475569'};
    var k = (subj || '').toLowerCase();
    if (COLORS[k]) return COLORS[k];
    var keys = Object.keys(COLORS);
    for (var i = 0; i < keys.length; i++) {
      if (k.indexOf(keys[i]) !== -1 || (keys[i] && k.indexOf(keys[i].toLowerCase()) !== -1)) return COLORS[keys[i]];
    }
    return {bg:'#f1f5f9',t:'#475569'};
  }

  function hdrs() { return {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}; }

  function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 3000);
  }

  function setLoading() {
    document.getElementById('timetableContainer').innerHTML =
      '<div class="state-box"><span class="state-icon">⏳</span><div class="state-title">جارٍ التحميل... / Loading...</div></div>';
  }

  function buildTableHTML(rows, label) {
    if (!rows || rows.length === 0) return '<div class="state-box"><span class="state-icon">📭</span><div class="state-title">لا جدول لـ ' + label + '</div></div>';
    var matrix = {};
    var maxP = 0;
    rows.forEach(function(r) {
      var p = parseInt(r.period);
      var d = r.day;
      if (!p || !d) return;
      if (!matrix[p]) matrix[p] = {};
      matrix[p][d] = {subj: r.subject || '', teacher: r.teacher_name || '', cls: r.class_name || ''};
      if (p > maxP) maxP = p;
    });
    if (!maxP) return '<div class="state-box"><span class="state-icon">📭</span><div class="state-title">لا جدول مسجّل</div></div>';

    var html = '<table><thead><tr><th>الحصة</th>';
    DAYS.forEach(function(d,i) { html += '<th>' + d + '<br><span style="font-size:.65rem;opacity:.8">' + DAYS_EN[i] + '</span></th>'; });
    html += '</tr></thead><tbody>';
    for (var p = 1; p <= maxP; p++) {
      html += '<tr><td class="period-cell"><span class="period-num">' + p + '</span></td>';
      DAYS.forEach(function(d) {
        var cell = matrix[p] && matrix[p][d];
        if (cell && cell.subj) {
          var sc = getColor(cell.subj);
          html += '<td><span class="subject-pill" style="background:' + sc.bg + ';color:' + sc.t + '">' + cell.subj + '</span>';
          if (currentMode === 'teacher' && cell.cls) {
            html += '<span class="teacher-lbl">' + cell.cls + '</span>';
          } else if (cell.teacher && currentMode !== 'teacher') {
            html += '<span class="teacher-lbl">' + cell.teacher + '</span>';
          }
          html += '</td>';
        } else {
          html += '<td></td>';
        }
      });
      html += '</tr>';
    }
    html += '</tbody></table>';
    return html;
  }

  function renderSingle(rows, label) {
    document.getElementById('timetableContainer').innerHTML =
      '<div class="tbl-title">🏫 ' + label + '</div>' +
      '<div class="tbl-wrap">' + buildTableHTML(rows, label) + '</div>';
  }

  function renderMultiple(groups) {
    var html = '';
    var keys = Object.keys(groups).sort(function(a,b){
      var an = parseInt(a) || 999, bn = parseInt(b) || 999;
      if (an !== bn) return an - bn;
      return a.localeCompare(b);
    });
    keys.forEach(function(key) {
      html += '<div class="tbl-title">🏫 ' + key + '</div>';
      html += '<div class="tbl-wrap">' + buildTableHTML(groups[key], key) + '</div>';
    });
    document.getElementById('timetableContainer').innerHTML = html || '<div class="state-box"><span class="state-icon">📭</span><div class="state-title">لا بيانات</div></div>';
  }

  function updateMeta(label) {
    var school = (window.EduOS && window.EduOS.SCHOOL_NAME) || '';
    document.getElementById('printSchool').textContent = school;
    document.getElementById('printMeta').innerHTML =
      '<span>📋 ' + label + '</span>' +
      (school ? '<span>🏫 ' + school + '</span>' : '') +
      '<span>📅 ' + new Date().toLocaleDateString('ar-AE') + '</span>';
  }

  function loadAndRender() {
    var val = document.getElementById('filterSelect').value;
    if (currentMode !== 'all' && !val) return;
    setLoading();

    var url;
    if (currentMode === 'class') {
      url = SB_URL + '/rest/v1/schedules?select=*&class_name=eq.' + encodeURIComponent(val) + '&order=period,day';
      updateMeta('الصف / Class: ' + val);
      fetch(url, {headers: hdrs()}).then(function(r){return r.json();}).then(function(rows){
        renderSingle(Array.isArray(rows) ? rows : [], val);
      }).catch(function(){renderSingle([], val);});
    } else if (currentMode === 'teacher') {
      url = SB_URL + '/rest/v1/schedules?select=*&teacher_name=eq.' + encodeURIComponent(val) + '&order=period,day';
      updateMeta('المعلم/ة: ' + val);
      fetch(url, {headers: hdrs()}).then(function(r){return r.json();}).then(function(rows){
        renderSingle(Array.isArray(rows) ? rows : [], val);
      }).catch(function(){renderSingle([], val);});
    } else if (currentMode === 'grade') {
      url = SB_URL + '/rest/v1/schedules?select=*&grade=eq.' + encodeURIComponent(val) + '&order=class_name,period,day';
      updateMeta('المرحلة / Grade: ' + val);
      fetch(url, {headers: hdrs()}).then(function(r){return r.json();}).then(function(rows){
        if (!Array.isArray(rows) || rows.length === 0) { renderSingle([], val); return; }
        var groups = {};
        rows.forEach(function(r){ var c = r.class_name || '—'; if (!groups[c]) groups[c] = []; groups[c].push(r); });
        renderMultiple(groups);
      }).catch(function(){renderSingle([], val);});
    } else if (currentMode === 'all') {
      url = SB_URL + '/rest/v1/schedules?select=*&order=class_name,period,day&limit=2000';
      updateMeta('جميع الفصول | All Classes');
      fetch(url, {headers: hdrs()}).then(function(r){return r.json();}).then(function(rows){
        if (!Array.isArray(rows) || rows.length === 0) {
          document.getElementById('timetableContainer').innerHTML = '<div class="state-box"><span class="state-icon">📭</span><div class="state-title">لا بيانات | No data</div></div>';
          return;
        }
        var groups = {};
        rows.forEach(function(r){ var c = r.class_name || '—'; if (!groups[c]) groups[c] = []; groups[c].push(r); });
        renderMultiple(groups);
      }).catch(function(){
        document.getElementById('timetableContainer').innerHTML = '<div class="state-box"><span class="state-icon">⚠️</span><div class="state-title">خطأ في التحميل</div></div>';
      });
    }
  }

  function populateFilter(mode) {
    var sel = document.getElementById('filterSelect');
    sel.innerHTML = '<option value="">اختر... / Select</option>';
    if (mode === 'all') {
      sel.style.display = 'none';
      loadAndRender();
      return;
    }
    sel.style.display = '';

    var url;
    if (mode === 'class') {
      url = SB_URL + '/rest/v1/schedules?select=class_name&order=class_name';
      fetch(url, {headers: hdrs()}).then(function(r){return r.json();}).then(function(rows){
        if (!Array.isArray(rows)) return;
        var seen = {}; var list = [];
        rows.forEach(function(r){ var c = (r.class_name||'').trim(); if (c && !seen[c]){seen[c]=true;list.push(c);} });
        list.sort(function(a,b){ var an=parseInt(a)||999,bn=parseInt(b)||999; if(an!==bn)return an-bn; return a.localeCompare(b); });
        list.forEach(function(c){ var o = document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
      });
    } else if (mode === 'teacher') {
      url = SB_URL + '/rest/v1/schedules?select=teacher_name&order=teacher_name';
      fetch(url, {headers: hdrs()}).then(function(r){return r.json();}).then(function(rows){
        if (!Array.isArray(rows)) return;
        var seen = {}; var list = [];
        rows.forEach(function(r){ var t=(r.teacher_name||'').trim(); if(t&&!seen[t]){seen[t]=true;list.push(t);} });
        list.sort(function(a,b){return a.localeCompare(b,'ar');});
        list.forEach(function(t){ var o=document.createElement('option'); o.value=t; o.textContent=t; sel.appendChild(o); });
      });
    } else if (mode === 'grade') {
      url = SB_URL + '/rest/v1/schedules?select=grade&order=grade';
      fetch(url, {headers: hdrs()}).then(function(r){return r.json();}).then(function(rows){
        if (!Array.isArray(rows)) return;
        var seen = {}; var list = [];
        rows.forEach(function(r){ var g=(r.grade||'').trim(); if(g&&!seen[g]){seen[g]=true;list.push(g);} });
        list.sort(function(a,b){ var an=parseInt(a)||999,bn=parseInt(b)||999; if(an!==bn)return an-bn; return a.localeCompare(b); });
        list.forEach(function(g){ var o=document.createElement('option'); o.value=g; o.textContent='المرحلة / Grade ' + g; sel.appendChild(o); });
      });
    }
  }

  // MODE TABS
  document.querySelectorAll('.mode-tab').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.mode-tab').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      currentMode = btn.getAttribute('data-mode');
      document.getElementById('timetableContainer').innerHTML =
        '<div class="state-box"><span class="state-icon">📋</span><div class="state-title">اختر الفلتر أدناه | Choose filter below</div></div>';
      populateFilter(currentMode);
    });
  });

  document.getElementById('filterSelect').addEventListener('change', loadAndRender);
  document.getElementById('btnBack').addEventListener('click', function(){ location.href = '/apps/eduos-timetable/'; });
  document.getElementById('btnPrint').addEventListener('click', function(){ window.print(); });
  document.getElementById('btnPDF').addEventListener('click', function(){
    showToast('⏳ جارٍ التحضير...');
    setTimeout(function(){ window.print(); }, 400);
  });

  // INIT — set school name
  var school = (window.EduOS && window.EduOS.SCHOOL_NAME) || '';
  document.getElementById('printLogo').textContent = '🎓 EduOS' + (school ? ' — ' + school : '');
  document.getElementById('printSchool').textContent = school;
  populateFilter('class');
})();
</script>
</body>
</html>
