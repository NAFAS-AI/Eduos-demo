<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>تغيير كلمة المرور — EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    margin: 0;
    padding: 0;font-family:'Tajawal',Arial,sans-serif;background:linear-gradient(135deg,#F0F4F8 0%,#ede9fe 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl;padding:20px}
:root{--primary:#6C3DD6;--secondary:#22D3EE;--border:#e2e8f0;--text:#1e293b;--text2:#64748b}
.box{background:#fff;border-radius:20px;padding:40px 36px;max-width:450px;width:100%;box-shadow:0 12px 40px rgba(108,61,214,.15)}
.logo-area{text-align:center;margin-bottom:28px}
.logo-badge{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff;border-radius:16px;padding:12px 20px;font-size:1.4rem;font-weight:900;display:inline-block;margin-bottom:8px}
.title{font-size:1.2rem;font-weight:900;color:var(--text);text-align:center;margin-bottom:4px}
.sub{font-size:.85rem;color:var(--text2);text-align:center;margin-bottom:28px}
.form-group{margin-bottom:16px;position:relative}
.form-label{display:block;font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:6px}
.input-wrap{position:relative}
.input-wrap input{width:100%;padding:11px 14px 11px 44px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:.9rem;background:#F8FAFF;color:var(--text)}
.input-wrap input:focus{outline:none;border-color:#6C3DD6;background:#fff}
.eye-btn{position:absolute;left:12px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;font-size:1rem;color:var(--text2)}
.strength-bar{height:5px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin-top:6px}
.strength-fill{height:100%;border-radius:4px;transition:.3s;width:0}
.strength-label{font-size:.72rem;font-weight:700;margin-top:4px}
.requirements{background:#F8FAFF;border-radius:10px;padding:12px 14px;margin-bottom:20px;font-size:.78rem}
.req-item{display:flex;align-items:center;gap:6px;padding:3px 0;color:var(--text2)}
.req-item.valid{color:#16a34a}
.req-item.valid::before{content:'✅'}
.req-item:not(.valid)::before{content:'⬜'}
.btn{width:100%;padding:12px;border-radius:12px;border:none;cursor:pointer;font-family:inherit;font-size:.92rem;font-weight:700;transition:.2s;margin-top:4px}
.btn-primary{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff}.btn-primary:hover{opacity:.9}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text2);margin-top:10px}.btn-outline:hover{border-color:#6C3DD6}
.toast{position:fixed;top:30px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:10px;padding:12px 24px;font-size:.88rem;font-weight:600;z-index:999;display:none}
.toast.show{display:block}
</style>
</head>
<body>
<div class="box">
  <div class="logo-area">
    <div class="logo-badge">🔐 EduOS</div>
    <div class="title">تغيير كلمة المرور</div>
    <div class="sub">Change Password</div>
  </div>

  <div class="form-group">
    <label class="form-label">كلمة المرور الحالية | Current Password</label>
    <div class="input-wrap">
      <input type="password" id="currentPwd" placeholder="••••••••"/>
      <button class="eye-btn" onclick="togglePwd('currentPwd')">👁️</button>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">كلمة المرور الجديدة | New Password</label>
    <div class="input-wrap">
      <input type="password" id="newPwd" placeholder="••••••••" oninput="checkStrength(this.value)"/>
      <button class="eye-btn" onclick="togglePwd('newPwd')">👁️</button>
    </div>
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="strength-label" id="strengthLabel" style="color:#64748b"></div>
  </div>

  <div class="form-group">
    <label class="form-label">تأكيد كلمة المرور | Confirm Password</label>
    <div class="input-wrap">
      <input type="password" id="confirmPwd" placeholder="••••••••" oninput="checkMatch()"/>
      <button class="eye-btn" onclick="togglePwd('confirmPwd')">👁️</button>
    </div>
    <div id="matchMsg" style="font-size:.75rem;font-weight:700;margin-top:4px"></div>
  </div>

  <div class="requirements" id="requirements">
    <div style="font-weight:700;font-size:.78rem;margin-bottom:6px;color:#1e293b">متطلبات كلمة المرور:</div>
    <div class="req-item" id="req-len">8 أحرف على الأقل</div>
    <div class="req-item" id="req-upper">حرف كبير (A-Z)</div>
    <div class="req-item" id="req-num">رقم (0-9)</div>
    <div class="req-item" id="req-special">رمز خاص (!@#$%)</div>
  </div>

  <button class="btn btn-primary" onclick="changePwd()">🔐 تغيير كلمة المرور</button>
  <button class="btn btn-outline" onclick="location.href='/apps/eduos-hub/'">إلغاء — Cancel</button>
</div>
<div class="toast" id="toast"></div>
<script src="../platform-lang.js" defer></script>
<script>
const SB='https://zuyizaiugpmhmeycqton.supabase.co';
function togglePwd(id){ const i=document.getElementById(id); i.type=i.type==='password'?'text':'password'; }
function checkStrength(v){
  let score=0;
  const checks={len:v.length>=8,upper:/[A-Z]/.test(v),num:/[0-9]/.test(v),special:/[!@#$%^&*]/.test(v)};
  Object.values(checks).forEach(c=>{ if(c) score++; });
  const colors=['#ef4444','#f97316','#eab308','#22c55e'];
  const labels=['ضعيفة جداً','ضعيفة','مقبولة','قوية'];
  document.getElementById('strengthFill').style.width=`${score*25}%`;
  document.getElementById('strengthFill').style.background=colors[score-1]||'#e2e8f0';
  document.getElementById('strengthLabel').textContent=score>0?labels[score-1]:'';
  document.getElementById('strengthLabel').style.color=colors[score-1]||'#64748b';
  document.getElementById('req-len').className=`req-item${checks.len?' valid':''}`;
  document.getElementById('req-upper').className=`req-item${checks.upper?' valid':''}`;
  document.getElementById('req-num').className=`req-item${checks.num?' valid':''}`;
  document.getElementById('req-special').className=`req-item${checks.special?' valid':''}`;
}
function checkMatch(){
  const n=document.getElementById('newPwd').value;
  const c=document.getElementById('confirmPwd').value;
  const el=document.getElementById('matchMsg');
  if(!c) return;
  el.textContent=n===c?'✅ كلمتا المرور متطابقتان':'❌ غير متطابقتان';
  el.style.color=n===c?'#16a34a':'#ef4444';
}
async function changePwd(){
  const cur=document.getElementById('currentPwd').value;
  const nw=document.getElementById('newPwd').value;
  const con=document.getElementById('confirmPwd').value;
  if(!cur||!nw||!con){ showToast('⚠️ أكمل/ي جميع الحقول'); return; }
  if(nw!==con){ showToast('❌ كلمتا المرور غير متطابقتين'); return; }
  if(nw.length<8){ showToast('⚠️ كلمة المرور قصيرة جداً'); return; }
  try{
    const session=JSON.parse(sessionStorage.getItem('edoos_user')||'{}');
    if(session?.access_token){
      await fetch(`${SB}/auth/v1/user`,{method:'PUT',headers:{'apikey':'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1eWl6YWl1Z3BtaG1leWNxdG9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDk3NTYxNzcsImV4cCI6MjAyNTMzMjE3N30.LSbSGlMPy8TGlGDDFVaVWGYnZ-N_9schRKPD69FQNPU','Authorization':'Bearer '+session.access_token,'Content-Type':'application/json'},body:JSON.stringify({password:nw})});
    }
  }catch(e){}
  showToast('✅ تم تغيير كلمة المرور بنجاح!');
  setTimeout(()=>location.href='/apps/eduos-hub/',2000);
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
</body>
</html>
