<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منشئ جدول التبديل الذكي — EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',Arial,sans-serif}
body{
    margin: 0;
    padding: 0;background:#F8F5F0;color:#1C2A2A;min-height:100vh;direction:rtl}
.header{background:linear-gradient(135deg,#0D3333,#1a4a4a);color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.header-brand{display:flex;align-items:center;gap:12px}
.logo-box{width:42px;height:42px;background:linear-gradient(135deg,#D4A84B,#e8c06a);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.header-title{font-size:20px;font-weight:700}
.header-sub{font-size:12px;opacity:.7}
.badge{background:rgba(212,168,75,.2);color:#D4A84B;border:1px solid #D4A84B;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.btn{padding:10px 22px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-family:'Tajawal',Arial,sans-serif;font-weight:600;transition:all .2s}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}
.btn-primary{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff}
.btn-gold{background:#D4A84B;color:#fff}
.btn-green{background:#4caf50;color:#fff}
.container{max-width:1000px;margin:0 auto;padding:24px}
.card{background:#fff;border-radius:14px;padding:28px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:24px}
.card-title{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.swap-grid{display:grid;grid-template-columns:1fr 60px 1fr;gap:16px;align-items:start}
.teacher-side{background:#f8f8f8;border-radius:12px;padding:20px;border:2px solid #eee;transition:border-color .2s}
.teacher-side.active{border-color:#6C3DD6;background:#f0ebff}
.teacher-side-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
label{font-size:12px;color:#666;font-weight:600}
select,input{padding:10px 12px;border:1.5px solid #e5e5e5;border-radius:8px;font-size:13px;font-family:'Tajawal',Arial,sans-serif;color:#1C2A2A;background:#fff;transition:border-color .2s;width:100%}
select:focus,input:focus{outline:none;border-color:#6C3DD6}
.swap-arrow{display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:60px;gap:8px;color:#888}
.arrow-icon{font-size:36px;color:#D4A84B;transform:rotate(90deg)}
.arrow-label{font-size:11px;color:#aaa;text-align:center}
.period-card{background:#fff;border:1.5px solid #e5e5e5;border-radius:10px;padding:14px;margin-top:8px}
.period-subject{font-size:16px;font-weight:700;color:#1C2A2A}
.period-class{font-size:12px;color:#888;margin-top:3px}
.period-time{font-size:11px;color:#D4A84B;margin-top:3px}
.validation-box{border-radius:12px;padding:16px;margin-top:16px}
.val-ok{background:#d4edda;border:1.5px solid #c3e6cb;color:#155724}
.val-warn{background:#fff3cd;border:1.5px solid #ffeeba;color:#856404}
.val-error{background:#f8d7da;border:1.5px solid #f5c6cb;color:#721c24}
.val-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px}
.val-item:last-child{margin-bottom:0}
.preview-section{background:#f8f8f8;border-radius:12px;padding:20px;margin-top:20px;display:none}
.preview-title{font-size:15px;font-weight:700;margin-bottom:14px}
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.preview-before,.preview-after{border-radius:10px;padding:14px}
.preview-before{background:#fff3f0;border:1.5px solid #ffccbc}
.preview-after{background:#e8f5e9;border:1.5px solid #c8e6c9}
.preview-label{font-size:11px;font-weight:700;margin-bottom:10px;opacity:.7;text-transform:uppercase}
.preview-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.preview-row:last-child{border-bottom:none}
.swap-type-tabs{display:flex;gap:6px;background:#f0ede8;padding:4px;border-radius:10px;width:fit-content}
.stab{padding:8px 18px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;color:#666;transition:all .2s;border:none;background:transparent;font-family:'Tajawal',Arial,sans-serif}
.stab.active{background:#fff;color:#D4A84B;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.history-item:last-child{border-bottom:none}
.status-pending{background:#fff3cd;color:#856404;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600}
.status-approved{background:#d4edda;color:#155724;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600}
.status-rejected{background:#f8d7da;color:#721c24;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600}
.generate-btn{background:linear-gradient(135deg,#D4A84B,#e8c06a);color:#fff;padding:14px 32px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Tajawal',Arial,sans-serif;transition:opacity .2s;margin-top:14px;display:block;width:100%}
.generate-btn:hover{opacity:.9}
.flash{position:fixed;top:20px;right:20px;background:#4caf50;color:#fff;padding:12px 20px;border-radius:10px;z-index:2000;font-size:14px;font-weight:600;display:none}
.flash.error{background:#e74c3c}
</style>
</head>
<body>
<div class="header">
  <div class="header-brand">
    <div class="logo-box">↔️</div>
    <div>
      <div class="header-title">منشئ جدول التبديل الذكي</div>
      <div class="header-sub">Smart Period Swap Builder · EduOS</div>
    </div>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <span class="badge">مستوى B — اعتماد المدير/ة مطلوب</span>
    <button class="btn btn-ghost" onclick="location.href='../eduos-hub/'">← الرئيسية</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="card-title">🔄 بيانات التبديل — Swap Details</div>
    
    <div style="margin-bottom:18px">
      <label style="font-size:13px;color:#666;font-weight:600;margin-bottom:8px;display:block">نوع التبديل · Swap Type</label>
      <div class="swap-type-tabs">
        <button class="stab active" onclick="setSwapType('single',this)">📅 ليوم واحد</button>
        <button class="stab" onclick="setSwapType('permanent',this)">📌 دائم</button>
      </div>
      <div id="dateField" style="margin-top:12px">
        <label style="font-size:12px;color:#666;font-weight:600;display:block;margin-bottom:6px">تاريخ التبديل</label>
        <input type="date" id="swapDate" style="max-width:200px">
      </div>
    </div>

    <div class="swap-grid">
      <!-- Teacher A -->
      <div class="teacher-side" id="sideA">
        <div class="teacher-side-title">👩‍🏫 المعلم/ة الأول/ى — Teacher A</div>
        <div class="form-group">
          <label>اختر المعلم/ة</label>
          <select id="teacherA" onchange="loadTeacherSchedule('A')">
            <option value="">— اختر —</option>
          </select>
        </div>
        <div class="form-group" id="dayA_group" style="display:none">
          <label>اليوم</label>
          <select id="dayA" onchange="loadPeriods('A')">
            <option value="">— اليوم —</option>
            <option value="0">الاثنين</option>
            <option value="1">الثلاثاء</option>
            <option value="2">الأربعاء</option>
            <option value="3">الخميس</option>
            <option value="4">الجمعة</option>
          </select>
        </div>
        <div class="form-group" id="periodA_group" style="display:none">
          <label>الحصة</label>
          <select id="periodA" onchange="selectPeriod('A')">
            <option value="">— الحصة —</option>
          </select>
        </div>
        <div id="cellA_preview"></div>
      </div>

      <!-- Arrow -->
      <div class="swap-arrow">
        <div class="arrow-icon">⇄</div>
        <div class="arrow-label">تبديل<br>Swap</div>
      </div>

      <!-- Teacher B -->
      <div class="teacher-side" id="sideB">
        <div class="teacher-side-title">👩‍🏫 المعلم/ة الثاني/ة — Teacher B</div>
        <div class="form-group">
          <label>اختر المعلم/ة</label>
          <select id="teacherB" onchange="loadTeacherSchedule('B')">
            <option value="">— اختر —</option>
          </select>
        </div>
        <div class="form-group" id="dayB_group" style="display:none">
          <label>اليوم</label>
          <select id="dayB" onchange="loadPeriods('B')">
            <option value="">— اليوم —</option>
            <option value="0">الاثنين</option>
            <option value="1">الثلاثاء</option>
            <option value="2">الأربعاء</option>
            <option value="3">الخميس</option>
            <option value="4">الجمعة</option>
          </select>
        </div>
        <div class="form-group" id="periodB_group" style="display:none">
          <label>الحصة</label>
          <select id="periodB" onchange="selectPeriod('B')">
            <option value="">— الحصة —</option>
          </select>
        </div>
        <div id="cellB_preview"></div>
      </div>
    </div>

    <div class="form-group" style="margin-top:16px">
      <label>سبب التبديل · Reason (اختياري)</label>
      <input type="text" id="swapReason" placeholder="اكتب السبب هنا…" style="max-width:400px">
    </div>

    <div id="validationBox" style="display:none"></div>

    <div class="preview-section" id="previewSection">
      <div class="preview-title">👁 معاينة التبديل — Swap Preview</div>
      <div class="preview-grid" id="previewGrid"></div>
    </div>

    <button class="generate-btn" onclick="validateAndSubmit()">⚡ التحقق وإرسال للاعتماد</button>
  </div>

  <!-- Swap History -->
  <div class="card" id="historyCard">
    <div class="card-title">📋 سجل طلبات التبديل · Swap History</div>
    <div id="historyBody"><div style="color:#888;padding:16px;text-align:center">جاري التحميل…</div></div>
  </div>
</div>

<div class="flash" id="flash"></div>

<script src="../platform-config.js"></script>
<script src="../platform-auth-guard.js"></script>
<script>
const DAYS = ['الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة'];
const TIMES = ['07:10','07:50','08:30','09:10','09:50','10:30','11:10'];
const SB_URL = window.EduOS?.SB_URL || '';
const SB_KEY = window.EduOS?.SB_KEY || '';

let staffList = [];
let scheduleA = [], scheduleB = [];
let cellA = null, cellB = null;
let swapType = 'single';

async function sb(table, params='') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  return r.json();
}

async function sbInsert(table, body) {
  return fetch(`${SB_URL}/rest/v1/${table}`, {
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'},
    body: JSON.stringify(body)
  }).then(r=>r.json());
}

async function init() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('swapDate').value = today;
  staffList = await sb('staff_profiles', 'select=id,name_ar,name_en,staff_db_id,role_key&order=name_ar');
  const teachers = (staffList||[]).filter(s=>s.role_key==='teacher'||s.role_key==='sub_teacher');
  ['teacherA','teacherB'].forEach(id=>{
    const sel=document.getElementById(id);
    teachers.forEach(s=>{
      const o=document.createElement('option');
      o.value=s.staff_db_id||s.id;
      o.textContent=s.name_ar||s.name_en;
      sel.appendChild(o);
    });
  });
  await loadHistory();
}

function setSwapType(t, el) {
  swapType = t;
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('dateField').style.display = t==='single'?'block':'none';
}

async function loadTeacherSchedule(side) {
  const tid = document.getElementById(`teacher${side}`).value;
  if (!tid) return;
  const rows = await sb('schedules', `select=*&staff_db_id=eq.${encodeURIComponent(tid)}&order=day_index,period_index`);
  if (side==='A') { scheduleA=rows||[]; document.getElementById('sideA').classList.add('active'); }
  else { scheduleB=rows||[]; document.getElementById('sideB').classList.add('active'); }
  document.getElementById(`day${side}_group`).style.display='block';
  document.getElementById(`period${side}_group`).style.display='none';
  document.getElementById(`cell${side}_preview`).innerHTML='';
  if (side==='A') cellA=null; else cellB=null;
}

async function loadPeriods(side) {
  const dayIndex = parseInt(document.getElementById(`day${side}`).value);
  const schedule = side==='A'?scheduleA:scheduleB;
  const todayRows = schedule.filter(r=>r.day_index===dayIndex);
  const sel=document.getElementById(`period${side}`);
  sel.innerHTML='<option value="">— الحصة —</option>';
  todayRows.sort((a,b)=>a.period_index-b.period_index).forEach(r=>{
    const o=document.createElement('option');
    o.value=r.period_index; o.textContent=`حصة ${r.period_index+1} — ${r.subject||'–'} (${r.class_name})`;
    o.dataset.subject=r.subject; o.dataset.class=r.class_name;
    sel.appendChild(o);
  });
  document.getElementById(`period${side}_group`).style.display='block';
}

function selectPeriod(side) {
  const sel=document.getElementById(`period${side}`);
  const opt=sel.options[sel.selectedIndex];
  if (!opt||!opt.value) return;
  const dayIndex=parseInt(document.getElementById(`day${side}`).value);
  const periodIndex=parseInt(opt.value);
  const cell={day_index:dayIndex,period_index:periodIndex,subject:opt.dataset.subject,class_name:opt.dataset.class};
  if(side==='A') cellA=cell; else cellB=cell;
  document.getElementById(`cell${side}_preview`).innerHTML=`
    <div class="period-card">
      <div class="period-subject">${cell.subject||'—'}</div>
      <div class="period-class">${cell.class_name} · حصة ${periodIndex+1}</div>
      <div class="period-time">${TIMES[periodIndex]||''} · ${DAYS[dayIndex]}</div>
    </div>`;
  if (cellA && cellB) showPreview();
}

function showPreview() {
  const tidA=document.getElementById('teacherA').value;
  const tidB=document.getElementById('teacherB').value;
  const staffA=staffList.find(s=>s.staff_db_id===tidA||s.id===tidA);
  const staffB=staffList.find(s=>s.staff_db_id===tidB||s.id===tidB);
  document.getElementById('previewSection').style.display='block';
  document.getElementById('previewGrid').innerHTML=`
    <div class="preview-before">
      <div class="preview-label">📋 قبل التبديل · Before</div>
      <div class="preview-row"><span>${staffA?.name_ar||tidA}</span><span>${cellA.subject} · ${cellA.class_name} · ${DAYS[cellA.day_index]} ح${cellA.period_index+1}</span></div>
      <div class="preview-row"><span>${staffB?.name_ar||tidB}</span><span>${cellB.subject} · ${cellB.class_name} · ${DAYS[cellB.day_index]} ح${cellB.period_index+1}</span></div>
    </div>
    <div class="preview-after">
      <div class="preview-label">✅ بعد التبديل · After</div>
      <div class="preview-row"><span>${staffA?.name_ar||tidA}</span><span>${cellB.subject} · ${cellB.class_name} · ${DAYS[cellB.day_index]} ح${cellB.period_index+1}</span></div>
      <div class="preview-row"><span>${staffB?.name_ar||tidB}</span><span>${cellA.subject} · ${cellA.class_name} · ${DAYS[cellA.day_index]} ح${cellA.period_index+1}</span></div>
    </div>`;
  validateConflicts();
}

async function validateConflicts() {
  if (!cellA||!cellB) return;
  const tidA=document.getElementById('teacherA').value;
  const tidB=document.getElementById('teacherB').value;
  const issues=[];
  // Check if A is free at B's period/day (other than the B slot itself)
  const aAtBday = scheduleA.filter(r=>r.day_index===cellB.day_index&&r.period_index===cellB.period_index&&r.class_name!==cellA.class_name);
  if(aAtBday.length) issues.push(`⚠️ ${tidA} لديه/ا حصة أخرى في ${DAYS[cellB.day_index]} ح${cellB.period_index+1}: ${aAtBday.map(r=>r.class_name).join(',')}`);
  const bAtAday = scheduleB.filter(r=>r.day_index===cellA.day_index&&r.period_index===cellA.period_index&&r.class_name!==cellB.class_name);
  if(bAtAday.length) issues.push(`⚠️ ${tidB} لديه/ا حصة أخرى في ${DAYS[cellA.day_index]} ح${cellA.period_index+1}: ${bAtAday.map(r=>r.class_name).join(',')}`);
  // Same teacher check
  if(tidA===tidB) issues.push('❌ لا يمكن تبديل معلم/ة مع نفسه/ها');
  const box=document.getElementById('validationBox');
  box.style.display='block';
  if(!issues.length) {
    box.className='validation-box val-ok';
    box.innerHTML=`<div class="val-item">✅ لا تعارضات — التبديل ممكن</div><div class="val-item">✅ كلا المعلمين/ات متاحان/متاحتان في الوقت المطلوب</div>`;
  } else {
    box.className='validation-box val-'+(issues.some(i=>i.includes('❌'))?'error':'warn');
    box.innerHTML=issues.map(i=>`<div class="val-item">${i}</div>`).join('');
  }
  return issues.filter(i=>i.includes('❌')).length===0;
}

async function validateAndSubmit() {
  if (!cellA||!cellB) { showFlash('يرجى اختيار حصص كلا المعلمين/ات',true); return; }
  const ok = await validateConflicts();
  if (!ok) { showFlash('لا يمكن المتابعة — يوجد تعارض',true); return; }
  const tidA=document.getElementById('teacherA').value;
  const tidB=document.getElementById('teacherB').value;
  const session=JSON.parse(sessionStorage.getItem('edoos_user')||'{}');
  await sbInsert('schedule_swaps', {
    teacher_a_db_id:tidA, teacher_b_db_id:tidB,
    class_a:cellA.class_name, class_b:cellB.class_name,
    day_index:cellA.day_index, period_a:cellA.period_index, period_b:cellB.period_index,
    subject_a:cellA.subject, subject_b:cellB.subject,
    swap_date:swapType==='single'?document.getElementById('swapDate').value:null,
    swap_type:swapType, reason:document.getElementById('swapReason').value||'',
    status:'pending'
  });
  showFlash('✅ تم إرسال طلب التبديل — بانتظار اعتماد المدير/ة');
  await loadHistory();
}

async function loadHistory() {
  const rows = await sb('schedule_swaps', 'select=*&order=created_at.desc&limit=20');
  let html='';
  if (!rows||!rows.length) { document.getElementById('historyBody').innerHTML='<div style="color:#888;padding:16px;text-align:center">لا طلبات سابقة</div>'; return; }
  rows.forEach(r=>{
    const sa=staffList.find(s=>s.staff_db_id===r.teacher_a_db_id||s.id===r.teacher_a_db_id);
    const sb2=staffList.find(s=>s.staff_db_id===r.teacher_b_db_id||s.id===r.teacher_b_db_id);
    html+=`<div class="history-item">
      <div>
        <div style="font-weight:600">${sa?.name_ar||r.teacher_a_db_id} ⇄ ${sb2?.name_ar||r.teacher_b_db_id}</div>
        <div style="font-size:12px;color:#888">${r.class_a} ح${r.period_a+1} ↔ ${r.class_b} ح${r.period_b+1} · ${r.swap_type==='permanent'?'دائم':'يوم واحد'} ${r.swap_date||''}</div>
        ${r.reason?`<div style="font-size:12px;color:#aaa">${r.reason}</div>`:''}
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        ${r.status==='approved'?'<span class="status-approved">✅ مُعتمَد</span>':r.status==='rejected'?'<span class="status-rejected">❌ مرفوض</span>':'<span class="status-pending">⏳ معلّق</span>'}
        ${r.status==='pending'?`<button class="btn btn-green" style="padding:5px 12px;font-size:12px" onclick="approveSwap('${r.id}')">اعتماد</button><button class="btn btn-ghost" style="padding:5px 12px;font-size:12px;background:#e74c3c;color:#fff" onclick="rejectSwap('${r.id}')">رفض</button>`:''}
      </div>
    </div>`;
  });
  document.getElementById('historyBody').innerHTML=html;
}

async function approveSwap(id) {
  await fetch(`${SB_URL}/rest/v1/schedule_swaps?id=eq.${id}`,{
    method:'PATCH',
    headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=minimal'},
    body:JSON.stringify({status:'approved',approved_at:new Date().toISOString()})
  });
  showFlash('✅ تم اعتماد التبديل');
  await loadHistory();
}

async function rejectSwap(id) {
  await fetch(`${SB_URL}/rest/v1/schedule_swaps?id=eq.${id}`,{
    method:'PATCH',
    headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=minimal'},
    body:JSON.stringify({status:'rejected'})
  });
  showFlash('تم رفض الطلب','error');
  await loadHistory();
}

function showFlash(msg,err=false) {
  const f=document.getElementById('flash');
  f.textContent=msg; f.className='flash'+(err?' error':'');
  f.style.display='block';
  setTimeout(()=>f.style.display='none',3500);
}

init();
</script>
</body>
</html>
