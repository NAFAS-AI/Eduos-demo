<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>أخبار المدرسة — EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<script src="/apps/platform-autologout.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    margin: 0;
    padding: 0;font-family:'Tajawal',Arial,sans-serif;background:#F0F4F8;color:#1e293b;min-height:100vh;direction:rtl}
:root{--primary:#6C3DD6;--secondary:#22D3EE;--card:#fff;--border:#e2e8f0;--text:#1e293b;--text2:#64748b}
.hdr{background:linear-gradient(135deg,#6C3DD6,#22D3EE);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(108,61,214,.25)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{background:rgba(255,255,255,.2);border-radius:10px;padding:8px 14px;font-size:1.4rem;font-weight:900;color:#fff}
.hdr-title{color:#fff;font-size:1rem;font-weight:700}
.hdr-sub{color:rgba(255,255,255,.8);font-size:.75rem}
.btn-hdr{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 14px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;transition:.2s}
.btn-hdr:hover{background:rgba(255,255,255,.35)}
.tabs-bar{background:#fff;border-bottom:2px solid var(--border);padding:0 24px;display:flex;gap:2px;overflow-x:auto}
.tab{padding:14px 18px;border:none;background:transparent;color:var(--text2);font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.panel{display:none}.panel.active{display:block}
.main{padding:24px;max-width:1100px;margin:0 auto}
.card{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.card-title{font-size:1rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.news-card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;transition:.2s;margin-bottom:16px}
.news-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.1);border-color:var(--primary)}
.news-banner{height:140px;display:flex;align-items:center;justify-content:center;font-size:3.5rem}
.news-body{padding:18px}
.news-cat{font-size:.72rem;font-weight:700;color:var(--primary);text-transform:uppercase;margin-bottom:6px}
.news-title{font-size:1.05rem;font-weight:900;margin-bottom:8px;line-height:1.4}
.news-excerpt{font-size:.85rem;color:var(--text2);line-height:1.6;margin-bottom:10px}
.news-footer{display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:var(--text2)}
.badge{padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700;display:inline-block}
.badge-blue{background:#dbeafe;color:#1d4ed8}.badge-green{background:#dcfce7;color:#16a34a}.badge-yellow{background:#fef3c7;color:#d97706}
input,select,textarea{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:8px;color:var(--text);padding:9px 14px;font-family:inherit;font-size:.88rem}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:6px}
.btn{padding:9px 20px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:700;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff}.btn-primary:hover{opacity:.9}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--primary)}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:10px;padding:12px 24px;font-size:.88rem;font-weight:600;z-index:999;display:none}
.toast.show{display:block}
</style>
<script src="../platform-lang.js" defer></script>
<script src="../platform-config.js"></script>
</head>
<body>
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">📰</div>
    <div>
      <div class="hdr-title">أخبار المدرسة | School News</div>
      <div class="hdr-sub">أحدث الأخبار والإعلانات — EduOS</div>
    </div>
  </div>
  <button class="btn-hdr" onclick="location.href='/apps/eduos-hub/'">← الرئيسية</button>
</header>
<div class="tabs-bar">
  <button class="tab active" onclick="switchTab('all')">📰 كل الأخبار</button>
  <button class="tab" onclick="switchTab('announcements')">📣 إعلانات</button>
  <button class="tab" onclick="switchTab('events')">🗓️ فعاليات</button>
  <button class="tab" onclick="switchTab('publish')">➕ نشر خبر</button>
</div>
<div class="main">
  <div id="tab-all" class="panel active">
    <div id="newsList"></div>
  </div>

  <div id="tab-announcements" class="panel">
    <div id="announcementsList"></div>
  </div>

  <div id="tab-events" class="panel">
    <div id="eventsList"></div>
  </div>

  <div id="tab-publish" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">➕ نشر خبر / إعلان | Publish</div></div>
      <div style="max-width:600px">
        <div class="form-group"><label class="form-label">العنوان | Title</label><input type="text" id="newsTitle" placeholder="عنوان الخبر..."/></div>
        <div class="form-group"><label class="form-label">التصنيف | Category</label>
          <select id="newsCat"><option value="news">خبر | News</option><option value="announcement">إعلان | Announcement</option><option value="event">فعالية | Event</option><option value="achievement">إنجاز | Achievement</option></select>
        </div>
        <div class="form-group"><label class="form-label">الجمهور المستهدف | Audience</label>
          <select id="newsAudience"><option value="all">الجميع | All</option><option value="students">طلاب/ات | Students</option><option value="parents">أولياء/ولايات الأمور | Parents</option><option value="staff">الكادر | Staff</option></select>
        </div>
        <div class="form-group"><label class="form-label">المحتوى | Content</label><textarea id="newsContent" style="min-height:120px" placeholder="محتوى الخبر..."></textarea></div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-outline" onclick="previewNews()">👁️ معاينة</button>
          <button class="btn btn-primary" onclick="publishNews()">📢 نشر الآن</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SB='https://zuyizaiugpmhmeycqton.supabase.co';
const KEY=window.EduOS?.SB_KEY;
const catColors={news:'#dbeafe',announcement:'#fce7f3',event:'#dcfce7',achievement:'#fef3c7'};
const catEmoji={news:'📰',announcement:'📣',event:'🗓️',achievement:'🏆'};

const DEMO_NEWS=[
  {cat:'achievement',title:'مدرستنا تفوز بالمركز الأول في المسابقة العلمية الإماراتية',excerpt:'حققت طالباتنا المتميزات إنجازاً رائعاً بفوزهن بالمركز الأول على مستوى إمارة أبوظبي في مسابقة العلوم والتكنولوجيا.',date:'اليوم',badge:'badge-yellow'},
  {cat:'event',title:'حفل نهاية العام الدراسي 2025-2026',excerpt:'يُسعدنا دعوتكم/ن لحضور حفل نهاية العام الدراسي الذي سيُقام يوم الخميس الموافق 10 يوليو 2026.',date:'أمس',badge:'badge-green'},
  {cat:'announcement',title:'مواعيد امتحانات الفصل الدراسي الثالث',excerpt:'تُذكّر إدارة المدرسة بمواعيد امتحانات الفصل الدراسي الثالث: 24 يونيو – 3 يوليو 2026.',date:'منذ يومين',badge:'badge-blue'},
  {cat:'news',title:'تطوير البنية التحتية التكنولوجية للمدرسة',excerpt:'تسعى إدارة المدرسة إلى تطوير البنية التحتية بتوفير أجهزة حديثة وربط الإنترنت السريع في جميع الفصول.',date:'منذ 3 أيام',badge:'badge-blue'},
];

function renderNews(list,containerId){
  document.getElementById(containerId).innerHTML=list.map(n=>`
    <div class="news-card">
      <div class="news-banner" style="background:${catColors[n.cat]||'#F0F4F8'}">${catEmoji[n.cat]||'📰'}</div>
      <div class="news-body">
        <div class="news-cat">${n.cat==='news'?'خبر':n.cat==='announcement'?'إعلان':n.cat==='event'?'فعالية':'إنجاز'}</div>
        <div class="news-title">${n.title}</div>
        <div class="news-excerpt">${n.excerpt}</div>
        <div class="news-footer"><span>${n.date}</span><span class="badge ${n.badge}">${n.cat==='achievement'?'إنجاز':n.cat==='event'?'فعالية':n.cat==='announcement'?'إعلان':'خبر'}</span></div>
      </div>
    </div>`).join('');
}

async function init(){
  try{
    const r=await fetch(`${SB}/rest/v1/news_posts?select=*&order=created_at.desc&limit=20`,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    const posts=r.ok?await r.json():null;
    if(posts&&posts.length>0){
      const mapped=posts.map(p=>({cat:p.category||'news',title:p.title||'—',excerpt:p.content?.substring(0,120)||'',date:(p.created_at||'').slice(0,10),badge:'badge-blue'}));
      renderNews(mapped,'newsList');
      renderNews(mapped.filter(n=>n.cat==='announcement'),'announcementsList');
      renderNews(mapped.filter(n=>n.cat==='event'),'eventsList');
      return;
    }
  }catch(e){}
  renderNews(DEMO_NEWS,'newsList');
  renderNews(DEMO_NEWS.filter(n=>n.cat==='announcement'),'announcementsList');
  renderNews(DEMO_NEWS.filter(n=>n.cat==='event'),'eventsList');
}

async function publishNews(){
  const title=document.getElementById('newsTitle').value;
  const content=document.getElementById('newsContent').value;
  if(!title||!content){ showToast('⚠️ أدخل/ي العنوان والمحتوى'); return; }
  try{
    await fetch(`${SB}/rest/v1/news_posts`,{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({title,content,category:document.getElementById('newsCat').value,audience:document.getElementById('newsAudience').value})});
  }catch(e){}
  showToast('✅ تم نشر الخبر بنجاح!');
  document.getElementById('newsTitle').value='';
  document.getElementById('newsContent').value='';
  init(); switchTab('all');
}

function previewNews(){ showToast('👁️ المعاينة — قريباً'); }
function switchTab(n){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); ['all','announcements','events','publish'].forEach((t,i)=>{ if(t===n) document.querySelectorAll('.tab')[i].classList.add('active'); }); document.getElementById(`tab-${n}`).classList.add('active'); }
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
init();
</script>
</body>
</html>
