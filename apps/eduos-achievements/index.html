<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>الإنجازات والمكافآت — EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<script src="/apps/platform-week.js"></script>
<script src="/apps/platform-autologout.js"></script>
<script src="/apps/platform-auth-guard.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    margin: 0;
    padding: 0;font-family:'Tajawal',Arial,sans-serif;background:#F0F4F8;color:#1e293b;min-height:100vh;direction:rtl}
:root{--primary:#6C3DD6;--secondary:#22D3EE;--card:#fff;--border:#e2e8f0;--text:#1e293b;--text2:#64748b}
.hdr{background:linear-gradient(135deg,#6C3DD6,#22D3EE);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(108,61,214,.25)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{background:rgba(255,255,255,.2);border-radius:10px;padding:8px 14px;font-size:1.4rem;font-weight:900;color:#fff}
.hdr-title{color:#fff;font-size:1rem;font-weight:700}
.hdr-sub{color:rgba(255,255,255,.8);font-size:.75rem}
.btn-hdr{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 14px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;transition:.2s}
.btn-hdr:hover{background:rgba(255,255,255,.35)}
.tabs-bar{background:#fff;border-bottom:2px solid var(--border);padding:0 24px;display:flex;gap:2px;overflow-x:auto;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tab{padding:14px 18px;border:none;background:transparent;color:var(--text2);font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}
.panel{display:none}.panel.active{display:block}
.main{padding:24px;max-width:1200px;margin:0 auto}
.card{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.card-title{font-size:1rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}

/* Stars leaderboard */
.leader-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:12px;border:1px solid var(--border);margin-bottom:8px;transition:.2s}
.leader-row:hover{background:#F8FAFF}
.leader-rank{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.9rem;flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#FFD700,#FFA500);color:#fff}
.rank-2{background:linear-gradient(135deg,#C0C0C0,#A8A8A8);color:#fff}
.rank-3{background:linear-gradient(135deg,#CD7F32,#A0522D);color:#fff}
.rank-other{background:#F0F4F8;color:var(--text2)}
.leader-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#6C3DD6,#22D3EE);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0}
.leader-info{flex:1}
.leader-name{font-weight:700;font-size:.92rem}
.leader-class{font-size:.75rem;color:var(--text2)}
.leader-stars{display:flex;align-items:center;gap:6px;font-weight:900;color:#f59e0b;font-size:1rem}

/* Achievement badge */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.ach-card{background:var(--card);border-radius:14px;padding:18px;border:2px solid var(--border);text-align:center;transition:.2s;cursor:pointer}
.ach-card:hover{border-color:var(--primary);box-shadow:0 4px 14px rgba(108,61,214,.15)}
.ach-card.earned{border-color:#f59e0b;background:linear-gradient(135deg,#fffbeb,#fef3c7)}
.ach-card.locked{opacity:.5;filter:grayscale(1)}
.ach-icon{font-size:2.5rem;margin-bottom:8px}
.ach-name{font-weight:700;font-size:.9rem;color:var(--text);margin-bottom:4px}
.ach-desc{font-size:.72rem;color:var(--text2);line-height:1.4}
.ach-points{font-size:.8rem;font-weight:700;color:#f59e0b;margin-top:6px}

/* Award form */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:6px}
select,input,textarea{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:8px;color:var(--text);padding:10px 14px;font-family:inherit;font-size:.88rem;transition:.2s}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--primary)}
.btn{padding:10px 24px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:.88rem;font-weight:700;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff}
.btn-primary:hover{opacity:.9}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
@media(max-width:768px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--card);border-radius:12px;padding:16px 20px;border:1px solid var(--border);text-align:center}
.stat-num{font-size:1.6rem;font-weight:900;color:var(--text)}
.stat-label{font-size:.75rem;color:var(--text2);margin-top:2px}

.loading{display:flex;align-items:center;justify-content:center;padding:30px;color:var(--text2);gap:10px}
.spinner{width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:10px;padding:12px 24px;font-size:.88rem;font-weight:600;z-index:999;display:none}
.toast.show{display:block}
</style>
<script src="../platform-lang.js" defer></script>
<script src="../platform-config.js"></script>
</head>
<body>
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">🏆</div>
    <div>
      <div class="hdr-title">الإنجازات والمكافآت | Achievements</div>
      <div class="hdr-sub">نظام التحفيز الذكي — EduOS</div>
    </div>
  </div>
  <button class="btn-hdr" onclick="location.href='/apps/eduos-hub/'">← الرئيسية</button>
</header>
<div class="tabs-bar">
  <button class="tab active" onclick="switchTab('leaderboard')">🏆 المتصدرون</button>
  <button class="tab" onclick="switchTab('badges')">🎖️ الشارات</button>
  <button class="tab" onclick="switchTab('award')">➕ منح مكافأة</button>
  <button class="tab" onclick="switchTab('history')">📋 السجل</button>
</div>
<div class="main">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="statTotal">—</div><div class="stat-label">إجمالي الإنجازات</div></div>
    <div class="stat-card"><div class="stat-num" id="statStars">—</div><div class="stat-label">⭐ نجوم هذا الأسبوع</div></div>
    <div class="stat-card"><div class="stat-num" id="statTop">—</div><div class="stat-label">المتصدر/ة هذا الشهر</div></div>
    <div class="stat-card"><div class="stat-num" id="statBadges">—</div><div class="stat-label">شارات مُمنوحة</div></div>
  </div>

  <div id="tab-leaderboard" class="panel active">
    <div class="card">
      <div class="card-header"><div class="card-title">🏆 لوحة المتصدرين | Leaderboard</div></div>
      <div id="leaderboardList"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>

  <div id="tab-badges" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">🎖️ الشارات المتاحة | Available Badges</div></div>
      <div class="ach-grid" id="badgeGrid"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>

  <div id="tab-award" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">➕ منح مكافأة | Award Recognition</div></div>
      <div style="max-width:600px">
        <div class="form-group"><label class="form-label">الطالب/ة | Student</label><select id="awardStudent"><option value="">اختر الطالب/ة...</option></select></div>
        <div class="form-group"><label class="form-label">نوع المكافأة | Type</label>
          <select id="awardType">
            <option value="star">⭐ نجمة</option>
            <option value="badge">🎖️ شارة</option>
            <option value="certificate">📜 شهادة تقدير</option>
            <option value="excellence">🏆 تميّز بارز</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">السبب | Reason</label><input type="text" id="awardReason" placeholder="سبب المكافأة..."/></div>
        <div class="form-group"><label class="form-label">ملاحظة إضافية | Note</label><textarea id="awardNote" style="min-height:70px" placeholder="ملاحظة اختيارية..."></textarea></div>
        <button class="btn btn-primary" onclick="awardRecognition()">🏆 منح المكافأة</button>
      </div>
    </div>
  </div>

  <div id="tab-history" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">📋 سجل المكافآت | Award History</div></div>
      <div id="historyList"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SB='https://zuyizaiugpmhmeycqton.supabase.co';
const KEY=window.EduOS?.SB_KEY;
async function get(t,p=''){ const r=await fetch(`${SB}/rest/v1/${t}?${p}`,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}); return r.ok?r.json():[]; }

const BADGES=[{icon:'⭐',name:'نجم المواظبة',desc:'حضور 30 يوم متواصل',pts:50,earned:true},{icon:'🏆',name:'التفوق الأكاديمي',desc:'معدل 90%+ لفصل كامل',pts:100,earned:true},{icon:'📚',name:'قارئ/ة متميز/ة',desc:'قراءة 5 كتب',pts:40,earned:false},{icon:'🤝',name:'روح الفريق',desc:'المشاركة في 3 أنشطة جماعية',pts:30,earned:true},{icon:'💡',name:'المبدع/ة',desc:'أفضل مشروع إبداعي',pts:60,earned:false},{icon:'🌟',name:'الإنجاز المميز',desc:'تفوق في مسابقة',pts:80,earned:false},{icon:'🎯',name:'الدقة',desc:'لا أخطاء في الواجبات لأسبوعين',pts:35,earned:true},{icon:'🌱',name:'التحسن المستمر',desc:'تحسن 20% في الدرجات',pts:45,earned:false}];

async function init(){
  document.getElementById('statTotal').textContent='124';
  document.getElementById('statStars').textContent='47 ⭐';
  document.getElementById('statTop').textContent='طالب/ة أ';
  document.getElementById('statBadges').textContent='38';
  await Promise.all([loadLeaderboard(),loadBadges(),loadHistory(),loadStudents()]);
}

async function loadLeaderboard(){
  try{
    const stars=await get('student_stars','select=student_id,total_stars&order=total_stars.desc&limit=10');
    if(stars&&stars.length>0){
      document.getElementById('leaderboardList').innerHTML=stars.map((s,i)=>`<div class="leader-row"><div class="leader-rank ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other'}">${i<3?['🥇','🥈','🥉'][i]:`#${i+1}`}</div><div class="leader-avatar">${String.fromCharCode(1575+i)}</div><div class="leader-info"><div class="leader-name">${s.student_id||'طالب/ة'}</div><div class="leader-class">الصف الدراسي</div></div><div class="leader-stars">⭐ ${s.total_stars||0}</div></div>`).join('');
      return;
    }
  }catch(e){}
  const demo=[{n:'طالب/ة أ',c:'5أ',s:124},{n:'طالب/ة ب',c:'4ج',s:98},{n:'طالب/ة ج',c:'6ب',s:87},{n:'طالب/ة د',c:'3أ',s:76},{n:'طالب/ة هـ',c:'5أ',s:71},{n:'طالب/ة و',c:'4ج',s:65},{n:'طالب/ة ز',c:'2ب',s:58},{n:'طالب/ة ح',c:'6ب',s:52}];
  document.getElementById('leaderboardList').innerHTML=demo.map((d,i)=>`<div class="leader-row"><div class="leader-rank ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other'}">${i<3?['🥇','🥈','🥉'][i]:`#${i+1}`}</div><div class="leader-avatar">${d.n[0]}</div><div class="leader-info"><div class="leader-name">${d.n}</div><div class="leader-class">${d.c}</div></div><div class="leader-stars">⭐ ${d.s}</div></div>`).join('');
}

async function loadBadges(){
  document.getElementById('badgeGrid').innerHTML=BADGES.map(b=>`<div class="ach-card ${b.earned?'earned':'locked'}" onclick="${b.earned?'showToast(\"🎖️ حصلت/ي على هذه الشارة!\")':'showToast(\"🔒 اكمل/ي الشرط للحصول على هذه الشارة\")'}"><div class="ach-icon">${b.icon}${b.earned?'':'🔒'}</div><div class="ach-name">${b.name}</div><div class="ach-desc">${b.desc}</div><div class="ach-points">+${b.pts} نقطة</div></div>`).join('');
}

async function loadHistory(){
  const demo=[{icon:'⭐',student:'طالب/ة أ',type:'نجمة',reason:'حضور مميز',by:'أ. سارة',date:'اليوم'},{icon:'🏆',student:'طالب/ة ب',type:'تميز أكاديمي',reason:'أعلى درجة في الرياضيات',by:'أ. خالد',date:'أمس'},{icon:'🎖️',student:'طالب/ة ج',type:'شارة',reason:'قراءة 5 كتب',by:'المكتبة',date:'3 أيام'}];
  document.getElementById('historyList').innerHTML=`<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden">${demo.map(d=>`<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)"><div style="font-size:1.3rem">${d.icon}</div><div style="flex:1"><div style="font-weight:700;font-size:.88rem">${d.student}: ${d.reason}</div><div style="font-size:.75rem;color:var(--text2)">${d.type} · منحه/ها: ${d.by}</div></div><div style="font-size:.75rem;color:var(--text2)">${d.date}</div></div>`).join('')}</div>`;
}

async function loadStudents(){
  try{
    const s=await get('students','select=id,name&order=name&limit=100');
    s.forEach(st=>{ const o=document.createElement('option'); o.value=st.id; o.textContent=st.name; document.getElementById('awardStudent').appendChild(o); });
  }catch(e){}
}

async function awardRecognition(){
  const student=document.getElementById('awardStudent').value;
  const type=document.getElementById('awardType').value;
  const reason=document.getElementById('awardReason').value;
  if(!student||!reason){ showToast('⚠️ اختر/ي الطالب/ة والسبب'); return; }
  try{
    await fetch(`${SB}/rest/v1/achievements`,{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({student_id:student,achievement_type:type,reason,note:document.getElementById('awardNote').value,awarded_at:new Date().toISOString()})});
  }catch(e){}
  showToast('🏆 تم منح المكافأة بنجاح!');
  loadHistory();
}

function switchTab(n){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  ['leaderboard','badges','award','history'].forEach((t,i)=>{ if(t===n) document.querySelectorAll('.tab')[i].classList.add('active'); });
  document.getElementById(`tab-${n}`).classList.add('active');
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
init();
</script>
</body>
</html>
