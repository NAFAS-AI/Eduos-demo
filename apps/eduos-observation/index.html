<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جدول المشاهدات الصفية | EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="../platform-lang.js" defer></script>
<script src="../platform-shield.js" defer></script>
<script src="../platform-week.js"></script>
<style>
:root {
  --bg:#F0F4F8; --surface:#FFFFFF; --card:#FFFFFF; --border:#E2E8F0;
  --primary:#6C3DD6; --primary-light:#EDE9FF; --cyan:#06B6D4;
  --green:#059669; --green-light:#D1FAE5;
  --red:#DC2626; --red-light:#FEE2E2;
  --amber:#D97706; --amber-light:#FEF3C7;
  --blue:#2563EB; --blue-light:#DBEAFE;
  --text:#1E293B; --text-secondary:#64748B; --text-muted:#94A3B8;
  --gold:#D97706;
  --radius:14px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.10);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{
    margin: 0;
    padding: 0;font-family:'Tajawal',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;}

/* HEADER */
.header{background:var(--surface);border-bottom:2px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);}
.header-inner{max-width:1200px;margin:0 auto;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-logo{width:42px;height:42px;background:linear-gradient(135deg,#6C3DD6,#22D3EE);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.brand-info h1{font-size:1.1rem;font-weight:900;color:var(--text);}
.brand-info p{font-size:.75rem;color:var(--text-secondary);}
.header-actions{display:flex;align-items:center;gap:10px;}
.week-pill{background:var(--primary-light);color:var(--primary);border-radius:20px;padding:6px 16px;font-size:.85rem;font-weight:700;}
.btn-new{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:9px 20px;font-family:'Tajawal',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;}
.btn-new:hover{background:#5B2FC9;transform:translateY(-1px);}
.btn-icon{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .2s;}
.btn-icon:hover{border-color:var(--primary);color:var(--primary);}

/* TABS */
.tabs-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;}
.tabs-inner{max-width:1200px;margin:0 auto;display:flex;gap:4px;}
.tab-btn{padding:14px 20px;border:none;background:none;font-family:'Tajawal',sans-serif;font-size:.92rem;font-weight:600;color:var(--text-secondary);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);}
.tab-btn:hover:not(.active){color:var(--text);}
.tab-badge{background:var(--red);color:#fff;border-radius:10px;padding:1px 7px;font-size:.7rem;font-weight:800;}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:24px;}
.pane{display:none;}
.pane.active{display:block;}

/* ALERT STRIP */
.alert-strip{background:var(--amber-light);border:1.5px solid var(--amber);border-radius:12px;padding:14px 20px;margin-bottom:24px;display:flex;align-items:center;gap:12px;}
.alert-strip-icon{font-size:1.4rem;}
.alert-strip-text{font-size:.92rem;font-weight:600;color:var(--amber);}
.alert-strip-count{background:var(--amber);color:#fff;border-radius:20px;padding:2px 10px;font-size:.8rem;font-weight:800;margin-right:auto;}

/* GRID HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px;}
.section-title{font-size:1.1rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;}
.filter-chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-family:'Tajawal',sans-serif;font-size:.82rem;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all .2s;}
.filter-chip.active{background:var(--primary-light);border-color:var(--primary);color:var(--primary);}

/* TEACHER GRID */
.teachers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:32px;}
.teacher-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);transition:all .2s;cursor:pointer;}
.teacher-card:hover{border-color:var(--primary);box-shadow:var(--shadow-md);transform:translateY(-2px);}
.teacher-card.overdue{border-right:4px solid var(--red);}
.teacher-card.due-soon{border-right:4px solid var(--amber);}
.teacher-card.ok{border-right:4px solid var(--green);}
.teacher-card.never{border-right:4px solid var(--text-muted);}

.tc-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.tc-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--cyan));color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:900;flex-shrink:0;}
.tc-info{flex:1;}
.tc-name{font-size:1rem;font-weight:800;color:var(--text);}
.tc-subject{font-size:.82rem;color:var(--text-secondary);margin-top:2px;}
.tc-status{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:12px;white-space:nowrap;}
.status-overdue{background:var(--red-light);color:var(--red);}
.status-due-soon{background:var(--amber-light);color:var(--amber);}
.status-ok{background:var(--green-light);color:var(--green);}
.status-never{background:#F1F5F9;color:var(--text-secondary);}

.tc-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.tc-metric{background:var(--bg);border-radius:8px;padding:8px;text-align:center;}
.tc-metric-num{font-size:1.2rem;font-weight:900;color:var(--text);}
.tc-metric-lbl{font-size:.68rem;color:var(--text-secondary);margin-top:1px;}

.tc-last{font-size:.82rem;color:var(--text-secondary);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.tc-actions{display:flex;gap:8px;}
.btn-observe{flex:1;background:var(--primary);color:#fff;border:none;border-radius:10px;padding:9px;font-family:'Tajawal',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-observe:hover{background:#5B2FC9;}
.btn-history{padding:9px 14px;border:1.5px solid var(--border);border-radius:10px;background:none;font-family:'Tajawal',sans-serif;font-size:.88rem;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all .2s;}
.btn-history:hover{border-color:var(--primary);color:var(--primary);}

/* SCHEDULE TABLE */
.schedule-container{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:24px;}
.schedule-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.sched-nav-btn{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 16px;font-family:'Tajawal',sans-serif;font-size:.85rem;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all .2s;}
.sched-nav-btn:hover{border-color:var(--primary);color:var(--primary);}
.schedule-week-title{font-size:1rem;font-weight:800;}
.schedule-table{width:100%;border-collapse:collapse;}
.schedule-table th{background:var(--bg);padding:12px 16px;text-align:center;font-size:.85rem;font-weight:800;color:var(--text-secondary);border-bottom:1px solid var(--border);}
.schedule-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top;min-width:140px;}
.schedule-table tr:last-child td{border-bottom:none;}
.sched-teacher-cell{font-size:.9rem;font-weight:700;color:var(--text);white-space:nowrap;}
.sched-obs-slot{display:flex;flex-direction:column;gap:4px;}
.obs-chip{background:var(--primary-light);border-right:3px solid var(--primary);border-radius:6px;padding:5px 8px;cursor:pointer;transition:all .15s;}
.obs-chip:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
.obs-chip-teacher{font-size:.78rem;font-weight:700;color:var(--text);}
.obs-chip-type{font-size:.68rem;color:var(--text-secondary);}
.add-obs-btn{background:none;border:1.5px dashed var(--border);border-radius:6px;padding:6px;font-size:1rem;cursor:pointer;color:var(--text-muted);transition:all .2s;width:100%;}
.add-obs-btn:hover{border-color:var(--primary);color:var(--primary);}

/* HISTORY LIST */
.obs-history{display:flex;flex-direction:column;gap:12px;}
.obs-history-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;gap:16px;align-items:flex-start;}
.ohc-score{min-width:68px;text-align:center;background:var(--bg);border-radius:12px;padding:10px;}
.ohc-score-num{font-size:1.8rem;font-weight:900;color:var(--gold);}
.ohc-score-lbl{font-size:.68rem;color:var(--text-secondary);margin-top:2px;}
.ohc-body{flex:1;}
.ohc-teacher{font-size:1rem;font-weight:800;color:var(--text);}
.ohc-meta{font-size:.83rem;color:var(--text-secondary);margin:4px 0 10px;}
.ohc-scores{display:flex;flex-wrap:wrap;gap:6px;}
.score-chip{background:var(--bg);border-radius:8px;padding:4px 10px;font-size:.75rem;color:var(--text-secondary);}
.score-chip span{font-weight:700;color:var(--text);}

/* FORM OBSERVATION */
.obs-form-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);margin-bottom:20px;}
.obs-form-title{font-size:1.1rem;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.criteria-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:24px;}
.criterion-card{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:16px;transition:border-color .2s;}
.criterion-card:hover{border-color:var(--primary);}
.crit-name{font-size:.92rem;font-weight:700;color:var(--text);margin-bottom:4px;}
.crit-desc{font-size:.78rem;color:var(--text-secondary);margin-bottom:10px;line-height:1.5;}
.rating-btns{display:flex;gap:4px;}
.rb{flex:1;padding:7px 4px;border-radius:8px;border:1.5px solid var(--border);background:none;font-family:'Tajawal',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;}
.rb[data-r="4"].sel{background:rgba(5,150,105,.15);border-color:var(--green);color:var(--green);}
.rb[data-r="3"].sel{background:rgba(37,99,235,.15);border-color:var(--blue);color:var(--blue);}
.rb[data-r="2"].sel{background:rgba(217,119,6,.15);border-color:var(--amber);color:var(--amber);}
.rb[data-r="1"].sel{background:rgba(220,38,38,.15);border-color:var(--red);color:var(--red);}
.rb:hover{border-color:var(--primary);}

.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
@media(max-width:600px){.form-row-2{grid-template-columns:1fr;}}
.form-group{margin-bottom:0;}
.form-label{display:block;font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:7px;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'Tajawal',sans-serif;font-size:.92rem;color:var(--text);outline:none;transition:border-color .2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);}
.form-textarea{min-height:90px;resize:vertical;}
.score-preview{background:var(--primary-light);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.score-preview-num{font-size:2.2rem;font-weight:900;color:var(--primary);}
.score-preview-label{font-size:.9rem;color:var(--text-secondary);}
.score-preview-grade{font-size:1.1rem;font-weight:700;color:var(--primary);}
.btn-submit-obs{background:linear-gradient(135deg,var(--primary),var(--cyan));color:#fff;border:none;border-radius:12px;padding:14px 36px;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;}
.btn-submit-obs:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,61,214,.4);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border-radius:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-header{padding:22px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1;}
.modal-title{font-size:1.1rem;font-weight:900;color:var(--text);}
.modal-close{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:none;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all .2s;}
.modal-close:hover{background:var(--red-light);color:var(--red);}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.btn-cancel{padding:10px 22px;border:1.5px solid var(--border);border-radius:10px;background:none;font-family:'Tajawal',sans-serif;font-size:.95rem;font-weight:700;color:var(--text-secondary);cursor:pointer;}
.btn-save{padding:10px 28px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-save:hover{background:#5B2FC9;}

.empty-state{text-align:center;padding:48px 24px;color:var(--text-secondary);}
.empty-icon{font-size:3rem;margin-bottom:12px;}
.empty-title{font-size:1.1rem;font-weight:700;margin-bottom:6px;}
.loading{text-align:center;padding:40px;color:var(--text-secondary);}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--text);color:#fff;padding:12px 24px;border-radius:12px;font-size:.9rem;font-weight:700;z-index:900;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-logo">🎓</div>
      <div class="brand-info">
        <h1>المشاهدات الصفية</h1>
        <p>بوابة الجود الذكية · EduOS</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="week-pill" id="weekLabel">الأسبوع —</div>
      <button class="btn-new" onclick="openBookModal()">📋 جدولة مشاهدة</button>
      <button class="btn-icon" onclick="location.href='../eduos-hub/'">🏠</button>
    </div>
  </div>
</header>

<div class="tabs-bar">
  <div class="tabs-inner">
    <button class="tab-btn active" onclick="switchTab('overview',this)">🗂️ لوحة المعلمين/ات</button>
    <button class="tab-btn" onclick="switchTab('schedule',this)">📅 جدول الأسبوع</button>
    <button class="tab-btn" onclick="switchTab('form',this)">📝 تسجيل مشاهدة</button>
    <button class="tab-btn" onclick="switchTab('history',this)">📊 السجل الكامل</button>
  </div>
</div>

<div class="main">

  <!-- OVERVIEW TAB -->
  <div class="pane active" id="pane-overview">
    <div id="alertStrip" style="display:none" class="alert-strip">
      <span class="alert-strip-icon">⚠️</span>
      <span class="alert-strip-text">معلمون/ات لم يُلاحَظوا منذ أكثر من 4 أسابيع</span>
      <span class="alert-strip-count" id="overdueCount">0</span>
    </div>
    <div class="section-header">
      <div class="section-title">👩‍🏫 الكادر التدريسي — حالة المشاهدات</div>
      <div class="filter-row">
        <button class="filter-chip active" data-s="all" onclick="filterTeachers('all',this)">الكل</button>
        <button class="filter-chip" data-s="overdue" onclick="filterTeachers('overdue',this)">متأخرة 🔴</button>
        <button class="filter-chip" data-s="due-soon" onclick="filterTeachers('due-soon',this)">قريباً 🟡</button>
        <button class="filter-chip" data-s="ok" onclick="filterTeachers('ok',this)">سليمة 🟢</button>
      </div>
    </div>
    <div class="teachers-grid" id="teachersGrid">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- SCHEDULE TAB -->
  <div class="pane" id="pane-schedule">
    <div class="schedule-container">
      <div class="schedule-nav">
        <button class="sched-nav-btn" onclick="prevSchedWeek()">‹ الأسبوع السابق</button>
        <div class="schedule-week-title" id="schedWeekTitle"></div>
        <button class="sched-nav-btn" onclick="nextSchedWeek()">الأسبوع التالي ›</button>
      </div>
      <div style="overflow-x:auto">
        <table class="schedule-table" id="schedTable">
          <thead><tr id="schedHead"></tr></thead>
          <tbody id="schedBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- FORM TAB -->
  <div class="pane" id="pane-form">
    <div class="obs-form-section">
      <div class="obs-form-title">📝 تسجيل نتائج مشاهدة صفية</div>
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">المعلم/ة *</label>
          <select class="form-select" id="obsTeacher" onchange="updateScore()">
            <option value="">— اختر المعلم/ة —</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">المادة</label>
          <input class="form-input" id="obsSubject" placeholder="مثال: رياضيات، لغة عربية">
        </div>
      </div>
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">الصف</label>
          <input class="form-input" id="obsClass" placeholder="مثال: الصف الثالث أ">
        </div>
        <div class="form-group">
          <label class="form-label">تاريخ المشاهدة *</label>
          <input class="form-input" type="date" id="obsDate">
        </div>
      </div>

      <div class="obs-form-title" style="margin-top:24px;font-size:1rem;">معايير التقييم</div>
      <div class="criteria-grid" id="criteriaGrid"></div>

      <div class="score-preview" id="scorePreview">
        <div class="score-preview-num" id="scorePct">—</div>
        <div>
          <div class="score-preview-label">الدرجة الإجمالية</div>
          <div class="score-preview-grade" id="scoreGrade">—</div>
        </div>
      </div>

      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label">ملاحظات عامة</label>
        <textarea class="form-textarea" id="obsNotes" placeholder="ما أبرز ما لاحظته في هذه الحصة؟"></textarea>
      </div>
      <div class="form-group" style="margin-bottom:24px">
        <label class="form-label">نقاط التطوير المقترحة</label>
        <textarea class="form-textarea" id="obsDev" placeholder="ما الذي يمكن تطويره في الحصص القادمة؟"></textarea>
      </div>
      <button class="btn-submit-obs" onclick="submitObservation()">💾 حفظ نتائج المشاهدة</button>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div class="pane" id="pane-history">
    <div class="section-header">
      <div class="section-title">📊 سجل المشاهدات الكاملة</div>
      <select class="form-select" style="width:auto;padding:8px 14px" id="histFilter" onchange="renderHistory()">
        <option value="all">جميع المعلمين/ات</option>
      </select>
    </div>
    <div class="obs-history" id="obsHistory">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

</div>

<!-- BOOK MODAL -->
<div class="modal-overlay" id="bookModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">📋 جدولة مشاهدة جديدة</div>
      <button class="modal-close" onclick="closeModal('bookModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label">المعلم/ة *</label>
        <select class="form-select" id="bookTeacher"><option value="">— اختر —</option></select>
      </div>
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">التاريخ *</label>
          <input class="form-input" type="date" id="bookDate">
        </div>
        <div class="form-group">
          <label class="form-label">الوقت</label>
          <input class="form-input" type="time" id="bookTime" value="09:00">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">نوع المشاهدة</label>
        <select class="form-select" id="bookType">
          <option value="formal">رسمية</option>
          <option value="informal">غير رسمية</option>
          <option value="followup">متابعة</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('bookModal')">إلغاء</button>
      <button class="btn-save" onclick="saveBooking()">جدولة</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://zuyizaiugpmhmeycqton.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1eWl6YWl1Z3BtaG1leWNxdG9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQxMzE3NjksImV4cCI6MjA1OTcwNzc2OX0.gXMdMEIB7bVEBmQlqcvmJMCLJPHFh5pTdDoABWBOJok';

let allStaff = [], allObs = [], allScheduled = [];
let schedWeekOff = 0;
const user = JSON.parse(sessionStorage.getItem('edoos_user') || '{"name":"مدير/ة","role":"principal","id":"demo"}');

const CRITERIA = [
  {id:'prep',name:'التحضير والتخطيط',desc:'جودة خطة الدرس ووضوح الأهداف'},
  {id:'delivery',name:'تقديم الدرس',desc:'وضوح الشرح وتسلسل المحتوى'},
  {id:'engagement',name:'تفاعل الطالب/ة',desc:'مستوى المشاركة والتفاعل الصفي'},
  {id:'class_mgmt',name:'إدارة الفصل',desc:'النظام والانضباط الإيجابي'},
  {id:'assessment',name:'التقييم التكويني',desc:'متابعة فهم الطالب/ة أثناء الدرس'},
  {id:'diff',name:'التمييز والتفريق',desc:'مراعاة الفروق الفردية بين الطلبة'}
];

const ratings = {};

document.addEventListener('DOMContentLoaded',()=>{
  if(window.getPlatformWeek) document.getElementById('weekLabel').textContent='الأسبوع '+getPlatformWeek();
  document.getElementById('obsDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('bookDate').value = new Date().toISOString().slice(0,10);
  buildCriteriaForm();
  loadData();
});

async function loadData(){
  const [staffRes, obsRes] = await Promise.all([
    fetch(`${SB_URL}/rest/v1/staff_profiles?select=id,name_ar,subject&order=name_ar.asc`, {headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}}),
    fetch(`${SB_URL}/rest/v1/lesson_observation_results?order=observed_at.desc&limit=200`, {headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}})
  ]);
  allStaff = await staffRes.json().catch(()=>[]);
  allObs = await obsRes.json().catch(()=>[]);
  if(!Array.isArray(allStaff)) allStaff=[];
  if(!Array.isArray(allObs)) allObs=[];
  populateSelects();
  renderOverview();
  renderScheduleView();
  renderHistory();
}

function populateSelects(){
  const teachers = allStaff.filter(s=>s.role==='teacher'||s.role==='specialist'||!s.role);
  const opts = teachers.map(t=>`<option value="${t.id}">${t.full_name||t.id}</option>`).join('');
  ['obsTeacher','bookTeacher'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.innerHTML='<option value="">— اختر المعلم/ة —</option>'+opts;
  });
  const hist=document.getElementById('histFilter');
  if(hist) hist.innerHTML='<option value="all">جميع المعلمين/ات</option>'+teachers.map(t=>`<option value="${t.id}">${t.full_name}</option>`).join('');
}

function renderOverview(){
  const today=new Date();
  const grid=document.getElementById('teachersGrid');
  const teachers=allStaff.filter(s=>s.role==='teacher'||!s.role);
  let overdueCount=0;

  grid.innerHTML=teachers.map(t=>{
    const tObs=allObs.filter(o=>o.teacher_id===t.id);
    const lastObs=tObs[0];
    let weeksSince=999, statusClass='never', statusLabel='لم تُلاحَظ بعد', statusBadge='status-never';
    if(lastObs?.observed_at){
      const diff=(today-new Date(lastObs.observed_at))/(1000*60*60*24*7);
      weeksSince=Math.round(diff);
      if(weeksSince>4){statusClass='overdue';statusLabel=`${weeksSince} أسبوع`;statusBadge='status-overdue';overdueCount++;}
      else if(weeksSince>2){statusClass='due-soon';statusLabel=`منذ ${weeksSince} أسابيع`;statusBadge='status-due-soon';}
      else{statusClass='ok';statusLabel=`منذ ${weeksSince} أسابيع`;statusBadge='status-ok';}
    }
    const avgScore=tObs.length ? Math.round(tObs.reduce((s,o)=>s+(o.total_score||0),0)/tObs.length) : 0;
    const initial=(t.full_name||'م').charAt(0);
    return `<div class="teacher-card ${statusClass}" data-status="${statusClass}">
      <div class="tc-top">
        <div class="tc-avatar">${initial}</div>
        <div class="tc-info">
          <div class="tc-name">${t.full_name||t.id}</div>
          <div class="tc-subject">${t.subject||t.role||'معلم/ة'}</div>
        </div>
        <span class="tc-status ${statusBadge}">${statusLabel}</span>
      </div>
      <div class="tc-metrics">
        <div class="tc-metric"><div class="tc-metric-num">${tObs.length}</div><div class="tc-metric-lbl">مشاهدة</div></div>
        <div class="tc-metric"><div class="tc-metric-num" style="color:var(--gold)">${avgScore||'—'}</div><div class="tc-metric-lbl">متوسط</div></div>
        <div class="tc-metric"><div class="tc-metric-num" style="color:var(--${weeksSince<2?'green':weeksSince<4?'amber':'red'})">${weeksSince===999?'—':weeksSince}</div><div class="tc-metric-lbl">أسابيع</div></div>
      </div>
      <div class="tc-last">${lastObs?'📅 آخر مشاهدة: '+formatDate(lastObs.observed_at):'📭 لا مشاهدات مسجلة'}</div>
      <div class="tc-actions">
        <button class="btn-observe" onclick="openFormFor('${t.id}','${t.full_name||''}')">📝 مشاهدة</button>
        <button class="btn-history" onclick="filterAndShowHistory('${t.id}')">📊 السجل</button>
      </div>
    </div>`;
  }).join('') || '<div class="empty-state"><div class="empty-icon">👩‍🏫</div><div class="empty-title">لا يوجد كادر تدريسي</div></div>';

  document.getElementById('overdueCount').textContent=overdueCount;
  document.getElementById('alertStrip').style.display=overdueCount?'flex':'none';
}

function filterTeachers(status,el){
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.teacher-card').forEach(c=>{
    c.style.display=(status==='all'||c.dataset.status===status)?'block':'none';
  });
}

function renderScheduleView(){
  const days=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس'];
  const now=new Date();
  const start=new Date(now);
  const d=now.getDay();
  start.setDate(now.getDate()-(d===0?0:d<=4?d:d-7)+schedWeekOff*7);
  const dates=days.map((_,i)=>{const dd=new Date(start);dd.setDate(start.getDate()+i);return dd;});
  const [s,e]=[dates[0],dates[4]];
  document.getElementById('schedWeekTitle').textContent=`${s.toLocaleDateString('ar-AE',{month:'long',day:'numeric'})} — ${e.toLocaleDateString('ar-AE',{month:'long',day:'numeric',year:'numeric'})}`;

  const teachers=allStaff.filter(s=>s.role==='teacher'||!s.role).slice(0,10);
  const head=document.getElementById('schedHead');
  head.innerHTML='<th style="text-align:right;padding:12px 16px">المعلم/ة</th>'+dates.map(d=>`<th>${days[dates.indexOf(d)]}<br><small style="font-weight:400">${d.getDate()}</small></th>`).join('');

  const body=document.getElementById('schedBody');
  body.innerHTML=teachers.map(t=>{
    return `<tr>
      <td class="sched-teacher-cell">${t.full_name||t.id}</td>
      ${dates.map(d=>{
        const ds=d.toISOString().slice(0,10);
        const obs=allObs.filter(o=>o.teacher_id===t.id&&o.observed_at?.slice(0,10)===ds);
        return `<td>
          <div class="sched-obs-slot">
            ${obs.map(o=>`<div class="obs-chip" onclick=""><div class="obs-chip-teacher">✅ مُنجزة</div><div class="obs-chip-type">${o.total_score||'—'}/100</div></div>`).join('')}
            <button class="add-obs-btn" onclick="openFormAt('${t.id}','${t.full_name||''}','${ds}')">＋</button>
          </div>
        </td>`;
      }).join('')}
    </tr>`;
  }).join('');
}

function prevSchedWeek(){schedWeekOff--;renderScheduleView();}
function nextSchedWeek(){schedWeekOff++;renderScheduleView();}

function buildCriteriaForm(){
  document.getElementById('criteriaGrid').innerHTML=CRITERIA.map(c=>`
    <div class="criterion-card">
      <div class="crit-name">${c.name}</div>
      <div class="crit-desc">${c.desc}</div>
      <div class="rating-btns">
        ${[4,3,2,1].map(r=>`<button class="rb" data-r="${r}" data-crit="${c.id}" onclick="setRating('${c.id}',${r},this)">
          ${r===4?'ممتاز':r===3?'جيد':r===2?'مقبول':'يحتاج تطوير'}
        </button>`).join('')}
      </div>
    </div>
  `).join('');
}

function setRating(crit,val,el){
  ratings[crit]=val;
  document.querySelectorAll(`.rb[data-crit="${crit}"]`).forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  updateScore();
}

function updateScore(){
  const vals=Object.values(ratings);
  if(!vals.length){document.getElementById('scorePct').textContent='—';document.getElementById('scoreGrade').textContent='—';return;}
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  const pct=Math.round((avg/4)*100);
  document.getElementById('scorePct').textContent=pct+'%';
  const grade=pct>=90?'ممتاز ⭐':pct>=75?'جيد جداً 👍':pct>=60?'جيد':'يحتاج تطوير 📈';
  document.getElementById('scoreGrade').textContent=grade;
}

async function submitObservation(){
  const teacher_id=document.getElementById('obsTeacher').value;
  const date=document.getElementById('obsDate').value;
  if(!teacher_id||!date){showToast('يرجى اختيار المعلم/ة والتاريخ','error');return;}
  const pct=document.getElementById('scorePct').textContent;
  const teacher=allStaff.find(s=>s.id===teacher_id);
  const payload={
    teacher_id, teacher_name:teacher?.full_name||'',
    subject:document.getElementById('obsSubject').value,
    class_name:document.getElementById('obsClass').value,
    observed_at:date, observer_id:user.id||'admin', observer_name:user.name||'مدير/ة',
    criteria_scores:ratings, total_score:parseInt(pct)||0,
    notes:document.getElementById('obsNotes').value,
    development_points:document.getElementById('obsDev').value
  };
  try{
    const r=await fetch(`${SB_URL}/rest/v1/lesson_observation_results`,{
      method:'POST',headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify(payload)
    });
    if(r.ok||r.status===201){showToast('✅ تم حفظ نتائج المشاهدة','success');loadData();}
    else showToast('خطأ في الحفظ','error');
  }catch(e){showToast('خطأ في الاتصال','error');}
}

function renderHistory(){
  const filter=document.getElementById('histFilter')?.value||'all';
  const data=filter==='all'?allObs:allObs.filter(o=>o.teacher_id===filter);
  const el=document.getElementById('obsHistory');
  if(!data.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">لا توجد مشاهدات مسجلة</div></div>';return;}
  el.innerHTML=data.map(o=>`
    <div class="obs-history-card">
      <div class="ohc-score">
        <div class="ohc-score-num">${o.total_score||'—'}</div>
        <div class="ohc-score-lbl">من 100</div>
      </div>
      <div class="ohc-body">
        <div class="ohc-teacher">${o.teacher_name||o.teacher_id||'—'}</div>
        <div class="ohc-meta">${formatDate(o.observed_at)} · ${o.subject||''} ${o.class_name?'· '+o.class_name:''} · ${o.observer_name||''}</div>
        ${o.criteria_scores?`<div class="ohc-scores">${Object.entries(o.criteria_scores).map(([k,v])=>`<span class="score-chip">${k}: <span>${v}/4</span></span>`).join('')}</div>`:''}
        ${o.notes?`<div style="margin-top:8px;font-size:.85rem;color:var(--text-secondary)">${o.notes}</div>`:''}
      </div>
    </div>
  `).join('');
}

function openBookModal(){document.getElementById('bookModal').classList.add('open');}
function openFormFor(id,name){document.getElementById('obsTeacher').value=id;switchTab('form',document.querySelectorAll('.tab-btn')[2]);}
function openFormAt(id,name,date){document.getElementById('obsTeacher').value=id;document.getElementById('obsDate').value=date;switchTab('form',document.querySelectorAll('.tab-btn')[2]);}
function filterAndShowHistory(id){document.getElementById('histFilter').value=id;switchTab('history',document.querySelectorAll('.tab-btn')[3]);renderHistory();}

async function saveBooking(){
  const teacher_id=document.getElementById('bookTeacher').value;
  const date=document.getElementById('bookDate').value;
  if(!teacher_id||!date){showToast('يرجى اختيار المعلم/ة والتاريخ','error');return;}
  showToast('✅ تم جدولة المشاهدة','success');
  closeModal('bookModal');
}

function switchTab(id,el){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  el.classList.add('active');
  if(id==='schedule') renderScheduleView();
  if(id==='history') renderHistory();
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
function formatDate(ds){if(!ds)return'—';return new Date(ds).toLocaleDateString('ar-AE',{year:'numeric',month:'long',day:'numeric'});}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}
</script>
</body>
</html>
