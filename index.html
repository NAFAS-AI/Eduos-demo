<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=/apps/eduos-login/">
<title>EduOS Demo — مدرسة النور النموذجية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:#0D1B2A;color:#E8F4F8;
  min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.logo{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#6C3DD6,#22D3EE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sub{color:rgba(255,255,255,0.5);font-size:1rem;}
.spin{width:40px;height:40px;border:3px solid rgba(108,61,214,.2);
  border-top-color:#6C3DD6;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="spin"></div>
<div class="logo">🎓 EduOS</div>
<div class="sub">مدرسة النور النموذجية — جارٍ التحويل...</div>
<script>window.location.replace('/apps/eduos-login/');</script>
</body>
</html>
